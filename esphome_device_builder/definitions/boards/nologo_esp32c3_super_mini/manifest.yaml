id: nologo_esp32c3_super_mini
name: Nologo ESP32C3 SuperMini
description: 简介 ESP32C3SuperMini是一款基于 Espressif ESP32-C3 WiFi/蓝牙双模芯片的 IoT 迷你开发板。ESP32-C3
  是一款32 位 RISC-V CPU，包含FPU（浮点单元），可进行32 位单精度运算，具有强大的计算能力。它具有出色的射频性能，支持IEEE 802.11 b/g/n
  WiFi和蓝牙 5 (LE)协议...
manufacturer: Nologo
esphome:
  platform: esp32
  board: nologo_esp32c3_super_mini
  variant: esp32c3
  framework: esp-idf
hardware:
  flash_size: 4MB
  ram_size: 327680
  cpu_frequency: 160MHz
  connectivity:
  - wifi
  - bluetooth
