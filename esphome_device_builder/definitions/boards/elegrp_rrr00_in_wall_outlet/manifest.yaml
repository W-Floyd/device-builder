id: elegrp_rrr00_in_wall_outlet
name: Elegrp RRR00 Smart In-Wall Outlet with Energy Monitoring
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: bk72xx
  board: cbu
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Elegrp-RRR00-in-wall-outlet/RRR00-front-amazon.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Elegrp-RRR00-in-wall-outlet/backDetail.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Elegrp-RRR00-in-wall-outlet/relays.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Elegrp-RRR00-in-wall-outlet/wifiModuleFront.jpg
tags:
- relay
- compact
docs_url: https://devices.esphome.io/devices/Elegrp-RRR00-in-wall-outlet/
featured_components:
- id: factory_reset_button
  component_id: button.factory_reset
  fields:
    disabled_by_default: true
    entity_category: config
    icon: mdi:restart-alert
    id: factory_reset_button
    name: Factory Reset
- id: light_upper_white
  component_id: light.binary
  fields:
    internal: true
    output: upper_white_led
    id: light_upper_white
    name: light_upper_white
- id: light_lower_white
  component_id: light.binary
  fields:
    internal: true
    output: lower_white_led
    id: light_lower_white
    name: light_lower_white
- id: upper_white_led
  component_id: output.gpio
  fields:
    inverted:
      value: false
      locked: true
    id: upper_white_led
- id: lower_white_led
  component_id: output.gpio
  fields:
    inverted:
      value: false
      locked: true
    id: lower_white_led
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: WiFi Signal
- id: sensor_total_daily_energy_1
  component_id: sensor.total_daily_energy
  fields:
    unit_of_measurement: kWh
    state_class: total_increasing
    device_class: energy
    accuracy_decimals: 3
    id: sensor_total_daily_energy_1
    name: Total Daily Energy
- id: relay_1
  component_id: switch.gpio
  fields:
    restore_mode: RESTORE_DEFAULT_OFF
    id: relay_1
    name: Relay 1
- id: relay_2
  component_id: switch.gpio
  fields:
    restore_mode: RESTORE_DEFAULT_OFF
    id: relay_2
    name: Relay 2
featured_bundles:
- id: light_upper_white_setup
  name: light_upper_white (full setup)
  component_ids:
  - upper_white_led
  - light_upper_white
- id: light_lower_white_setup
  name: light_lower_white (full setup)
  component_ids:
  - lower_white_led
  - light_lower_white
source:
  type: esphome-devices
  remote_id: Elegrp-RRR00-in-wall-outlet
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Elegrp-RRR00-in-wall-outlet/index.md
