id: refoss_p11_plug
name: Refoss P11 Power Monitoring Plug
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp01_1m
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/refoss-p11-plug/refoss_P11.webp
tags:
- relay
- compact
pins:
- gpio: 5
  available: false
  occupied_by: button_1
- gpio: 12
  available: false
  occupied_by: sw_led1
- gpio: 13
  available: false
  occupied_by: Switch
- gpio: 17
  available: false
  occupied_by: Temperature
docs_url: https://devices.esphome.io/devices/refoss-p11-plug/
featured_components:
- id: button_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 5
      locked: true
    id: button_1
    name: button_1
- id: sensor_total_daily_energy_1
  component_id: sensor.total_daily_energy
  fields:
    unit_of_measurement: kWh
    icon: mdi:clock-alert
    id: sensor_total_daily_energy_1
    name: Total Daily Energy
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: Wifi Signal
- id: temp_analog_reading
  component_id: sensor.adc
  fields:
    unit_of_measurement: °C
    accuracy_decimals: 1
    icon: mdi:thermometer
    pin:
      value: 17
      locked: true
    id: temp_analog_reading
    name: Temperature
- id: relay_1
  component_id: switch.gpio
  fields:
    pin:
      value: 13
      locked: true
    icon: mdi:power-socket-fr
    restore_mode: RESTORE_DEFAULT_OFF
    id: relay_1
    name: Switch
- id: sw_led1
  component_id: switch.gpio
  fields:
    pin:
      value:
        number: 12
        inverted: true
      locked: true
    id: sw_led1
    name: sw_led1
source:
  type: esphome-devices
  remote_id: refoss-p11-plug
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/refoss-p11-plug/index.md
