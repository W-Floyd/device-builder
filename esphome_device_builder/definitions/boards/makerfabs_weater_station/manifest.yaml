id: makerfabs_weater_station
name: MAKERFABS-WEATHER-STATION
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32dev
  framework: esp-idf
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Makerfabs-Weater-Station/image_1.jpg
pins:
- gpio: 27
  available: false
  occupied_by: Wind Speed
docs_url: https://devices.esphome.io/devices/Makerfabs-Weater-Station/
featured_components:
- id: sensor_aht10_1
  component_id: sensor.aht10
  fields:
    update_interval: 10s
    id: sensor_aht10_1
    name: Aht10 1
- id: wind_speed_sensor
  component_id: sensor.pulse_counter
  fields:
    pin:
      value:
        number: 27
        mode:
          input: true
          pullup: true
      locked: true
    unit_of_measurement: m/s
    accuracy_decimals: 2
    update_interval: 5s
    id: wind_speed_sensor
    name: Wind Speed
- id: sensor_bmp280_i2c_1
  component_id: sensor.bmp280_i2c
  fields:
    address: 118
    update_interval: 10s
    iir_filter: 16X
    id: sensor_bmp280_i2c_1
    name: Bmp280 I2C 1
- id: wifi_signal_sensor
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: wifi_signal_sensor
    name: WiFi Signal Strength
source:
  type: esphome-devices
  remote_id: Makerfabs-Weater-Station
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Makerfabs-Weater-Station/index.md
  upstream_revision: 2bf64e131a2f72a0fc161c1f2f7d4de85c87a900
  content_hash: e92c70f08396f75f9f9e71ae713f9aa62f1fd44e45bd1c5b3f06469fe0c826c8
