id: umax_u_smart_wifi_plug_duo
name: UMAX U-Smart Wifi Plug Duo
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp8285
hardware:
  connectivity:
  - wifi
images:
- images/umax-wifi-plug-duo.jpeg
tags:
- relay
- compact
pins:
- gpio: 0
  available: false
  occupied_by: button2
- gpio: 4
  available: false
  occupied_by: sensor.hlw8012
- gpio: 5
  available: false
  occupied_by: sensor.hlw8012
- gpio: 12
  available: false
  occupied_by: sensor.hlw8012
- gpio: 14
  available: false
  occupied_by: Switch1
- gpio: 15
  available: false
  occupied_by: Switch2
- gpio: 16
  available: false
  occupied_by: button1
docs_url: https://devices.esphome.io/devices/UMAX-U-Smart-Wifi-Plug-Duo/
featured_components:
- id: button1
  component_id: binary_sensor.gpio
  fields:
    internal: true
    pin:
      value:
        number: 16
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    id: button1
    name: button1
- id: button2
  component_id: binary_sensor.gpio
  fields:
    internal: true
    pin:
      value:
        number: 0
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    id: button2
    name: button2
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: WiFi Signal
- id: sensor_hlw8012_1
  component_id: sensor.hlw8012
  fields:
    sel_pin:
      value:
        number: 12
        inverted: true
      locked: true
    cf_pin:
      value: 4
      locked: true
    cf1_pin:
      value: 5
      locked: true
    change_mode_every: 4
    update_interval: 3s
    id: sensor_hlw8012_1
    name: Hlw8012 1
- id: sensor_total_daily_energy_1
  component_id: sensor.total_daily_energy
  fields:
    unit_of_measurement: kWh
    icon: mdi:clock-alert
    id: sensor_total_daily_energy_1
    name: daily
- id: relay1
  component_id: switch.gpio
  fields:
    pin:
      value: 14
      locked: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:power-socket-eu
    id: relay1
    name: Switch1
- id: relay2
  component_id: switch.gpio
  fields:
    pin:
      value: 15
      locked: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:power-socket-eu
    id: relay2
    name: Switch2
source:
  type: esphome-devices
  remote_id: UMAX-U-Smart-Wifi-Plug-Duo
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/UMAX-U-Smart-Wifi-Plug-Duo/index.md
  upstream_revision: 7fa250835bc3d3a2b319dced285d5e0c27171bd1
  content_hash: ec49befff6c591386d4fbfffc0204edf6bb93fb676aa929dea8302f5fcf748ab
