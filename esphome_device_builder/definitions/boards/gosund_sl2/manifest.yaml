  fields:
    pin:
      value: 13
      locked: true
    id: output_blue
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    icon: mdi:wifi
    id: sensor_wifi_signal_1
    name: Wifi Signal
featured_bundles:
