id: nodemcuv2
name: NodeMCU v2 (ESP8266)
description: Popular ESP8266-based development board with USB-to-serial via CH340.
manufacturer: NodeMCU
esphome:
  platform: esp8266
  board: nodemcuv2
  framework: arduino
hardware:
  flash_size: 4MB
  cpu_frequency: 80MHz
  connectivity:
  - wifi
tags:
- dev-kit
docs_url: https://esphome.io/components/esp8266.html
pins:
- gpio: 0
  label: GPIO0
  features:
  - pwm
  - strapping
  available: null
  notes: Strapping pin (boot mode select) — pulled high for normal boot
- gpio: 1
  label: GPIO1
  features:
  - pwm
  - uart_tx
  available: null
  notes: Default UART0 TX
- gpio: 2
  label: GPIO2
  features:
  - pwm
  - strapping
  available: null
  notes: Strapping pin — must be high during boot
- gpio: 3
  label: GPIO3
  features:
  - pwm
  - uart_rx
  available: null
  notes: Default UART0 RX
- gpio: 4
  label: GPIO4
  features:
  - pwm
  - i2c_sda
  available: null
  notes: Default I2C SDA
- gpio: 5
  label: GPIO5
  features:
  - pwm
  - i2c_scl
  available: null
  notes: Default I2C SCL
- gpio: 6
  label: GPIO6
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash CLK — do not use
- gpio: 7
  label: GPIO7
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash D0 — do not use
- gpio: 8
  label: GPIO8
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash D1 — do not use
- gpio: 9
  label: GPIO9
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash D2 — do not use (may be usable in DIO mode)
- gpio: 10
  label: GPIO10
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash D3 — do not use (may be usable in DIO mode)
- gpio: 11
  label: GPIO11
  available: false
  occupied_by: SPI Flash
  notes: SPI Flash CS — do not use
- gpio: 12
  label: GPIO12
  features:
  - pwm
  - spi_miso
  available: null
  notes: Default SPI MISO
- gpio: 13
  label: GPIO13
  features:
  - pwm
  - spi_mosi
  available: null
  notes: Default SPI MOSI
- gpio: 14
  label: GPIO14
  features:
  - pwm
  - spi_clk
  available: null
  notes: Default SPI CLK
- gpio: 15
  label: GPIO15
  features:
  - pwm
  - spi_cs
  - strapping
  available: null
  notes: Default SPI CS — strapping pin (must be LOW during boot)
- gpio: 16
  label: GPIO16
  available: null
  occupied_by: Built-in LED
  notes: RTC wake pin — no PWM, no I2C, no interrupts; used for deep sleep wake
- gpio: 17
  label: A0
  features:
  - adc
  available: null
  notes: Analog input (TOUT pin) — 0-1V range, single ADC channel; not a standard
    GPIO
