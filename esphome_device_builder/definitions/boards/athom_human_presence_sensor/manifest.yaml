id: athom_human_presence_sensor
name: Athom Human Presence Sensor (PS01)
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp8285
hardware:
  connectivity:
  - wifi
images:
- images/Athom-Human-Presence-Sensor.webp
pins:
- gpio: 0
  available: false
  occupied_by: Button
- gpio: 12
  available: false
  occupied_by: mmWave Sensor
- gpio: 14
  available: false
  occupied_by: Pir Sensor
- gpio: 16
  available: false
  occupied_by: Status LED
docs_url: https://devices.esphome.io/devices/Athom-Human-Presence-Sensor/
product_url: https://github.com/athom-tech/athom-configs/blob/main/athom-presence-sensor.yaml
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 0
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    disabled_by_default: true
    id: binary_sensor_gpio_1
    name: Button
- id: pir
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 14
        mode:
          input: true
          pullup: true
      locked: true
    device_class: motion
    id: pir
    name: Pir Sensor
- id: mmwave
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 12
        mode:
          input: true
          pullup: true
      locked: true
    device_class: motion
    id: mmwave
    name: mmWave Sensor
- id: reset
  component_id: button.factory_reset
  fields:
    entity_category: config
    internal: true
    id: reset
    name: Restart with Factory Default Settings
- id: restart_esp
  component_id: button.restart
  fields:
    entity_category: config
    internal: true
    id: restart_esp
    name: Restart_esp
- id: led
  component_id: light.status_led
  fields:
    pin:
      value: 16
      locked: true
    disabled_by_default: true
    entity_category: config
    id: led
    name: Status LED
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: WiFi Signal Sensor
- id: sensor_bh1750_1
  component_id: sensor.bh1750
  fields:
    address: 35
    update_interval: 5s
    id: sensor_bh1750_1
    name: Light Sensor
source:
  type: esphome-devices
  remote_id: Athom-Human-Presence-Sensor
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Athom-Human-Presence-Sensor/index.md
  upstream_revision: 7fa250835bc3d3a2b319dced285d5e0c27171bd1
  content_hash: 1d88ce5c5392f31ee0bb1ee51f84057b890f2922ead6a9a5d9b763ab0edc8b55
