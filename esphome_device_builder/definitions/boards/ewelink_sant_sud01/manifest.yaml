id: ewelink_sant_sud01
name: eWeLink PCIe Computer Remote (SANT-SUD01)
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp8285
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/eWeLink-SANT-SUD01/eWeLink-SANT-SUD01-PCIe-power-remote.jpg
pins:
- gpio: 0
  available: false
  occupied_by: power_status_pulses
- gpio: 12
  available: false
  occupied_by: out_relay
docs_url: https://devices.esphome.io/devices/eWeLink-SANT-SUD01/
featured_components:
- id: out_relay
  component_id: output.gpio
  fields:
    inverted:
      value: true
      locked: true
    pin:
      value: 12
      locked: true
    id: out_relay
- id: power_status_pulses
  component_id: sensor.pulse_meter
  fields:
    pin:
      value: 0
      locked: true
    timeout: 5s
    id: power_status_pulses
    name: power_status_pulses
- id: wifi_signal_db
  component_id: sensor.wifi_signal
  fields:
    update_interval: 600s
    entity_category: diagnostic
    id: wifi_signal_db
    name: WiFi Signal dB
source:
  type: esphome-devices
  remote_id: eWeLink-SANT-SUD01
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/eWeLink-SANT-SUD01/index.md
  upstream_revision: 7b98102863a3093e1d3c00c8bb77e71eeb43ad6e
