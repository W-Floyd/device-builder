id: tuya_smart_star_projector_sk20
name: Tuya Smart Star Projector SK20
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: bk72xx
  board: wb3s
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Tuya-Smart-Star-Projector-SK20/SK20.jpg
docs_url: https://devices.esphome.io/devices/Tuya-Smart-Star-Projector-SK20/
featured_components:
- id: rgb_light
  component_id: light.rgb
  fields:
    restore_mode: ALWAYS_OFF
    red: red
    green: green
    blue: blue
    id: rgb_light
    name: Light
- id: laser
  component_id: light.monochromatic
  fields:
    icon: mdi:laser-pointer
    restore_mode: ALWAYS_OFF
    output: laser_pwm
    id: laser
    name: Laser
- id: button_led0
  component_id: light.status_led
  fields:
    restore_mode: ALWAYS_OFF
    internal: true
    output: button_led0_gpio
    id: button_led0
    name: Button Status LED
- id: button_led1
  component_id: light.monochromatic
  fields:
    restore_mode: ALWAYS_OFF
    output: button_led1_pwm
    id: button_led1
    name: Button LED1
- id: red
  component_id: output.libretiny_pwm
  fields:
    inverted:
      value: true
      locked: true
    id: red
- id: green
  component_id: output.libretiny_pwm
  fields:
    inverted:
      value: true
      locked: true
    id: green
- id: blue
  component_id: output.libretiny_pwm
  fields:
    inverted:
      value: true
      locked: true
    id: blue
- id: laser_pwm
  component_id: output.libretiny_pwm
  fields:
    inverted:
      value: true
      locked: true
    id: laser_pwm
- id: motor_pwm
  component_id: output.libretiny_pwm
  fields:
    min_power: 15%
    id: motor_pwm
- id: button_led0_gpio
  component_id: output.gpio
  fields:
    inverted:
      value: true
      locked: true
    id: button_led0_gpio
- id: button_led1_pwm
  component_id: output.libretiny_pwm
  fields:
    inverted:
      value: true
      locked: true
    id: button_led1_pwm
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: Signal
featured_bundles:
- id: rgb_light_setup
  name: Light (full setup)
  component_ids:
  - red
  - green
  - blue
  - rgb_light
- id: laser_setup
  name: Laser (full setup)
  component_ids:
  - laser_pwm
  - laser
- id: button_led0_setup
  name: Button Status LED (full setup)
  component_ids:
  - button_led0_gpio
  - button_led0
- id: button_led1_setup
  name: Button LED1 (full setup)
  component_ids:
  - button_led1_pwm
  - button_led1
