id: gosund_sw9
name: Gosund SW9
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp01_1m
hardware:
  connectivity:
  - wifi
images:
- images/gosund_sw9.jpg
- images/gosund_sw9_int.jpg
pins:
- gpio: 0
  available: false
  occupied_by: Button 1
- gpio: 2
  available: false
  occupied_by: Switch 1 state LED
- gpio: 4
  available: false
  occupied_by: Switch 2 state LED
- gpio: 5
  available: false
  occupied_by: Button 2
- gpio: 12
  available: false
  occupied_by: relay2
- gpio: 14
  available: false
  occupied_by: relay1
docs_url: https://devices.esphome.io/devices/Gosund-SW9/
featured_components:
- id: button1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 0
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    id: button1
    name: Button 1
- id: button2
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 5
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    id: button2
    name: Button 2
- id: switch_1_led_state
  component_id: light.status_led
  fields:
    pin:
      value: 2
      locked: true
    id: switch_1_led_state
    name: Switch 1 state LED
- id: switch_2_led_state
  component_id: light.status_led
  fields:
    pin:
      value: 4
      locked: true
    id: switch_2_led_state
    name: Switch 2 state LED
- id: entity_id_1
  component_id: light.binary
  fields:
    output: relay1
    id: entity_id_1
    name: $entity_name_1
- id: entity_id_2
  component_id: light.binary
  fields:
    output: relay2
    id: entity_id_2
    name: $entity_name_2
- id: relay1
  component_id: output.gpio
  fields:
    pin:
      value: 14
      locked: true
    id: relay1
- id: relay2
  component_id: output.gpio
  fields:
    pin:
      value: 12
      locked: true
    id: relay2
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: $name WiFi signal
featured_bundles:
- id: entity_id_1_setup
  name: $entity_name_1 (full setup)
  component_ids:
  - relay1
  - entity_id_1
- id: entity_id_2_setup
  name: $entity_name_2 (full setup)
  component_ids:
  - relay2
  - entity_id_2
source:
  type: esphome-devices
  remote_id: Gosund-SW9
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Gosund-SW9/index.md
