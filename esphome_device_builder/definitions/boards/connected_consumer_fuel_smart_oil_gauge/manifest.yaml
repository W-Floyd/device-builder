id: connected_consumer_fuel_smart_oil_gauge
name: Smart Oil Gauge
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp_wroom_02
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Connected-Consumer-Fuel-Smart-Oil-Gauge/Product-Image.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Connected-Consumer-Fuel-Smart-Oil-Gauge/Connections-Front.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Connected-Consumer-Fuel-Smart-Oil-Gauge/Connections-Back.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Connected-Consumer-Fuel-Smart-Oil-Gauge/Flashing-Front.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Connected-Consumer-Fuel-Smart-Oil-Gauge/Flashing-Edge.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Connected-Consumer-Fuel-Smart-Oil-Gauge/Ultrasonic.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Connected-Consumer-Fuel-Smart-Oil-Gauge/IC-Locations.jpg
pins:
- gpio: 2
  available: false
  occupied_by: LED_pwm
- gpio: 4
  available: false
  occupied_by: Distance to Oil
- gpio: 5
  available: false
  occupied_by: Distance to Oil
- gpio: 12
  available: false
  occupied_by: Control Button
- gpio: 13
  available: false
  occupied_by: Sleep 1hr
- gpio: 14
  available: false
  occupied_by: Ultrasonic Pwr
- gpio: 15
  available: false
  occupied_by: TempSens EN
docs_url: https://devices.esphome.io/devices/Connected-Consumer-Fuel-Smart-Oil-Gauge/
featured_components:
- id: ctrl_btn
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 12
        inverted: true
      locked: true
    id: ctrl_btn
    name: Control Button
- id: led_pwm
  component_id: output.slow_pwm
  fields:
    period: 1s
    pin:
      value: 2
      locked: true
    inverted:
      value: true
      locked: true
    id: led_pwm
- id: adc_input
  component_id: sensor.adc
  fields:
    accuracy_decimals: 5
    update_interval: 5s
    entity_category: diagnostic
    id: adc_input
    name: ADC Input
- id: oil_distance
  component_id: sensor.ultrasonic
  fields:
    trigger_pin:
      value:
        number: 4
        inverted: true
      locked: true
    echo_pin:
      value: 5
      locked: true
    accuracy_decimals: 25
    update_interval: never
    id: oil_distance
    name: Distance to Oil
- id: done
  component_id: switch.gpio
  fields:
    pin:
      value: 13
      locked: true
    entity_category: config
    disabled_by_default: true
    id: done
    name: Done
- id: tempsens_en
  component_id: switch.gpio
  fields:
    pin:
      value: 15
      locked: true
    entity_category: config
    disabled_by_default: true
    id: tempsens_en
    name: TempSens EN
- id: ultrasonic_pwr
  component_id: switch.gpio
  fields:
    pin:
      value: 14
      locked: true
    entity_category: config
    disabled_by_default: false
    id: ultrasonic_pwr
    name: Ultrasonic Pwr
- id: sleep_1hr
  component_id: switch.gpio
  fields:
    pin:
      value: 13
      locked: true
    entity_category: config
    disabled_by_default: true
    id: sleep_1hr
    name: Sleep 1hr
source:
  type: esphome-devices
  remote_id: Connected-Consumer-Fuel-Smart-Oil-Gauge
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Connected-Consumer-Fuel-Smart-Oil-Gauge/index.md
  upstream_revision: 7b98102863a3093e1d3c00c8bb77e71eeb43ad6e
  content_hash: ae7339c7490ada5d43e6f2ff03973325fb566bd7a4961e7d7371f9c253738f6a
