id: citilab_ed1
name: Citilab ED1
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32dev
  framework: arduino
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Citilab-ED1/ed1-board.jpg
pins:
- gpio: 2
  available: false
  occupied_by: Button Left
- gpio: 4
  available: false
  occupied_by: Button Up
- gpio: 13
  available: false
  occupied_by: Button Down
- gpio: 14
  available: false
  occupied_by: Button X
- gpio: 15
  available: false
  occupied_by: Button OK
- gpio: 26
  available: false
  occupied_by: buzzer_output
- gpio: 27
  available: false
  occupied_by: Button Right
- gpio: 34
  available: false
  occupied_by: Light Level
docs_url: https://devices.esphome.io/devices/Citilab-ED1/
product_url: https://github.com/glifocat/ed1-hoas
featured_components:
- id: btn_up
  component_id: binary_sensor.esp32_touch
  fields:
    pin:
      value: 4
      locked: true
    threshold: 500
    id: btn_up
    name: Button Up
- id: btn_down
  component_id: binary_sensor.esp32_touch
  fields:
    pin:
      value: 13
      locked: true
    threshold: 500
    id: btn_down
    name: Button Down
- id: btn_left
  component_id: binary_sensor.esp32_touch
  fields:
    pin:
      value: 2
      locked: true
    threshold: 500
    id: btn_left
    name: Button Left
- id: btn_right
  component_id: binary_sensor.esp32_touch
  fields:
    pin:
      value: 27
      locked: true
    threshold: 500
    id: btn_right
    name: Button Right
- id: btn_ok
  component_id: binary_sensor.esp32_touch
  fields:
    pin:
      value: 15
      locked: true
    threshold: 500
    id: btn_ok
    name: Button OK
- id: btn_x
  component_id: binary_sensor.esp32_touch
  fields:
    pin:
      value: 14
      locked: true
    threshold: 900
    id: btn_x
    name: Button X
- id: buzzer_output
  component_id: output.ledc
  fields:
    pin:
      value: 26
      locked: true
    id: buzzer_output
- id: wifi_signal_sensor
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: wifi_signal_sensor
    name: WiFi Signal
- id: light_sensor
  component_id: sensor.adc
  fields:
    pin:
      value: 34
      locked: true
    attenuation: 12db
    update_interval: 5s
    unit_of_measurement: '%'
    id: light_sensor
    name: Light Level
source:
  type: esphome-devices
  remote_id: Citilab-ED1
