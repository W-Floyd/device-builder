id: sonoff_thr316
name: Sonoff THR316
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32dev
  variant: esp32
  framework: esp-idf
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- images/SonoffTHR316.jpg
tags:
- relay
- sonoff
pins:
- gpio: 0
  available: false
  occupied_by: reset
- gpio: 13
  available: false
  occupied_by: auto_led
- gpio: 15
  available: false
  occupied_by: wifi_status_led
- gpio: 16
  available: false
  occupied_by: switch_led
- gpio: 21
  available: false
  occupied_by: $friendly_name
- gpio: 27
  available: false
  occupied_by: sensor_power
docs_url: https://devices.esphome.io/devices/Sonoff-THR316/
featured_components:
- id: reset
  component_id: binary_sensor.gpio
  fields:
    pin:
      value: 0
      locked: true
    internal: true
    id: reset
    name: reset
- id: climate_control
  component_id: climate.thermostat
  fields:
    min_heating_off_time: 5s
    min_heating_run_time: 5s
    min_idle_time: 5s
    heat_deadband: 2
    default_preset: Home
    sensor: temp
    id: climate_control
    name: $friendly_name Climate Control
- id: switch_led
  component_id: light.status_led
  fields:
    internal: true
    pin:
      value:
        number: 16
        inverted: true
      locked: true
    id: switch_led
    name: switch_led
- id: wifi_status_led
  component_id: light.status_led
  fields:
    internal: true
    pin:
      value:
        number: 15
        inverted: true
      locked: true
    id: wifi_status_led
    name: wifi_status_led
- id: auto_led
  component_id: light.status_led
  fields:
    internal: true
    pin:
      value:
        number: 13
        inverted: true
      locked: true
    id: auto_led
    name: auto_led
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: $friendly_name Wifi RSSI
- id: temp
  component_id: sensor.dallas_temp
  fields:
    index: 0
    id: temp
    name: $friendly_name Temperature
- id: relay
  component_id: switch.gpio
  fields:
    pin:
      value: 21
      locked: true
    restore_mode: RESTORE_DEFAULT_OFF
    id: relay
    name: $friendly_name
- id: sensor_power
  component_id: switch.gpio
  fields:
    pin:
      value: 27
      locked: true
    restore_mode: ALWAYS_ON
    id: sensor_power
    name: sensor_power
featured_bundles:
- id: climate_control_setup
  name: $friendly_name Climate Control (full setup)
  component_ids:
  - temp
  - climate_control
source:
  type: esphome-devices
  remote_id: Sonoff-THR316
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Sonoff-THR316/index.md
  upstream_revision: 7fa250835bc3d3a2b319dced285d5e0c27171bd1
  content_hash: a3614e703d23aeb669975b754a6aaeb79d820cc2804cd2663ee2ebd1ffa49472
