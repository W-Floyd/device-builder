id: athom_smart_plug_au
name: Athom Smart Plug AU
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp8285
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Athom-Smart-Plug-AU/Athom-Plug-AU.png
tags:
- relay
- compact
pins:
- gpio: 3
  available: false
  occupied_by: $upper_devicename Power Button
- gpio: 4
  available: false
  occupied_by: sensor.hlw8012
- gpio: 5
  available: false
  occupied_by: sensor.hlw8012
- gpio: 12
  available: false
  occupied_by: sensor.hlw8012
- gpio: 13
  available: false
  occupied_by: blue_led
- gpio: 14
  available: false
  occupied_by: $devicename
docs_url: https://devices.esphome.io/devices/Athom-Smart-Plug-AU/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 3
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    id: binary_sensor_gpio_1
    name: $upper_devicename Power Button
- id: sensor_hlw8012_1
  component_id: sensor.hlw8012
  fields:
    sel_pin:
      value:
        number: 12
        inverted: true
      locked: true
    cf_pin:
      value: 4
      locked: true
    cf1_pin:
      value: 5
      locked: true
    voltage_divider: 780
    change_mode_every: 1
    update_interval: 5s
    id: sensor_hlw8012_1
    name: Hlw8012 1
- id: sensor_total_daily_energy_1
  component_id: sensor.total_daily_energy
  fields:
    unit_of_measurement: kWh
    id: sensor_total_daily_energy_1
    name: $upper_devicename Total Daily Energy
- id: blue_led
  component_id: switch.gpio
  fields:
    pin:
      value:
        number: 13
        inverted: true
      locked: true
    id: blue_led
    name: blue_led
- id: relay
  component_id: switch.gpio
  fields:
    pin:
      value: 14
      locked: true
    id: relay
    name: $devicename
source:
  type: esphome-devices
  remote_id: Athom-Smart-Plug-AU
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Athom-Smart-Plug-AU/index.md
  upstream_revision: 2bf64e131a2f72a0fc161c1f2f7d4de85c87a900
  content_hash: 9bdc0d10332ba04862e79a69453cb70f10e7d174859e7a49d71f9e3f2394c1b7
