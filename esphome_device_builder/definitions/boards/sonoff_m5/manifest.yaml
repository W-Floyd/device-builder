id: sonoff_m5
name: Sonoff M5 Wall Switch 1/2/3-gang
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32dev
  variant: esp32
  framework: arduino
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- images/Sonoff_M5_2gang_MB.jpg
tags:
- sonoff
pins:
- gpio: 4
  available: false
  occupied_by: Left
- gpio: 5
  available: false
  occupied_by: LED
- gpio: 15
  available: false
  occupied_by: Right
- gpio: 18
  available: false
  occupied_by: pwm_output
- gpio: 19
  available: false
  occupied_by: Right
- gpio: 22
  available: false
  occupied_by: led_2
- gpio: 23
  available: false
  occupied_by: Left
docs_url: https://devices.esphome.io/devices/Sonoff-M5/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 4
        mode: INPUT_PULLUP
        inverted: false
      locked: true
    id: binary_sensor_gpio_1
    name: Left
- id: binary_sensor_gpio_2
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 15
        mode: INPUT_PULLUP
        inverted: false
      locked: true
    id: binary_sensor_gpio_2
    name: Right
- id: led_status
  component_id: light.status_led
  fields:
    pin:
      value:
        number: 5
        inverted: true
      locked: true
    internal: true
    restore_mode: ALWAYS_OFF
    id: led_status
    name: LED
- id: light_monochromatic_1
  component_id: light.monochromatic
  fields:
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:led-outline
    entity_category: config
    output: pwm_output
    id: light_monochromatic_1
    name: LEDs
- id: led_2
  component_id: output.gpio
  fields:
    pin:
      value:
        number: 22
        inverted: false
      locked: true
    id: led_2
- id: pwm_output
  component_id: output.ledc
  fields:
    pin:
      value: 18
      locked: true
    frequency: 1000 Hz
    id: pwm_output
- id: sensor_rssi
  component_id: sensor.wifi_signal
  fields:
    update_interval: 90s
    entity_category: diagnostic
    id: sensor_rssi
    name: RSSI
- id: relay_1
  component_id: switch.gpio
  fields:
    pin:
      value: 23
      locked: true
    id: relay_1
    name: Left
- id: relay_2
  component_id: switch.gpio
  fields:
    pin:
      value: 19
      locked: true
    id: relay_2
    name: Right
featured_bundles:
- id: light_monochromatic_1_setup
  name: LEDs (full setup)
  component_ids:
  - pwm_output
  - light_monochromatic_1
