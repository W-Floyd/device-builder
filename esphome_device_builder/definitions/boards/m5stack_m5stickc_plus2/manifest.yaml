id: m5stack_m5stickc_plus2
name: M5Stack M5StickC PLUS2
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32dev
  variant: esp32
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- images/m5stickcplus2.png
pins:
- gpio: 2
  available: false
  occupied_by: buzzer
- gpio: 10
  available: false
  occupied_by: builtin_led
- gpio: 27
  available: false
  occupied_by: backlight
- gpio: 37
  available: false
  occupied_by: Button A
- gpio: 38
  available: false
  occupied_by: Battery Voltage
- gpio: 39
  available: false
  occupied_by: Button B
docs_url: https://devices.esphome.io/devices/M5Stack-M5StickC-PLUS2/
product_url: https://docs.m5stack.com/en/core/M5StickC%20PLUS2
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 37
        inverted: false
      locked: true
    id: binary_sensor_gpio_1
    name: Button A
- id: binary_sensor_gpio_2
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 39
        inverted: true
      locked: true
    id: binary_sensor_gpio_2
    name: Button B
- id: led1
  component_id: light.monochromatic
  fields:
    output: builtin_led
    id: led1
    name: Led
- id: display_bl
  component_id: light.monochromatic
  fields:
    output: backlight
    id: display_bl
    name: Backlight
- id: builtin_led
  component_id: output.ledc
  fields:
    pin:
      value: 10
      locked: true
    inverted:
      value: true
      locked: true
    id: builtin_led
- id: buzzer
  component_id: output.ledc
  fields:
    pin:
      value: 2
      locked: true
    inverted:
      value: true
      locked: true
    id: buzzer
- id: backlight
  component_id: output.ledc
  fields:
    pin:
      value: 27
      locked: true
    inverted:
      value: true
      locked: true
    id: backlight
- id: sensor_adc_1
  component_id: sensor.adc
  fields:
    pin:
      value: 38
      locked: true
    attenuation: 12db
    update_interval: 60s
    id: sensor_adc_1
    name: Battery Voltage
- id: sensor_mpu6886_1
  component_id: sensor.mpu6886
  fields:
    address: 104
    update_interval: 10s
    id: sensor_mpu6886_1
    name: Mpu6886 1
featured_bundles:
- id: led1_setup
  name: Led (full setup)
  component_ids:
  - builtin_led
  - led1
- id: display_bl_setup
  name: Backlight (full setup)
  component_ids:
  - backlight
  - display_bl
source:
  type: esphome-devices
  remote_id: M5Stack-M5StickC-PLUS2
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/M5Stack-M5StickC-PLUS2/index.md
  upstream_revision: 7fa250835bc3d3a2b319dced285d5e0c27171bd1
  content_hash: 6f1fcd1ba1bc92f794b370c4b5f4982381d1f8428305767f314b0b87b3cf3a68
