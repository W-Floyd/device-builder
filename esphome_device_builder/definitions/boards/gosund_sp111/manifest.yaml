id: gosund_sp111
name: Gosund SP111
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp8285
hardware:
  connectivity:
  - wifi
images:
- images/gosund-sp111.JPG
tags:
- relay
- compact
pins:
- gpio: 0
  available: false
  occupied_by: led_red
- gpio: 4
  available: false
  occupied_by: sensor.hlw8012
- gpio: 5
  available: false
  occupied_by: sensor.hlw8012
- gpio: 12
  available: false
  occupied_by: sensor.hlw8012
- gpio: 13
  available: false
  occupied_by: button_state
- gpio: 15
  available: false
  occupied_by: relay
docs_url: https://devices.esphome.io/devices/Gosund-SP111/
featured_components:
- id: binary_sensor_status_1
  component_id: binary_sensor.status
  fields:
    device_class: connectivity
    id: binary_sensor_status_1
    name: Status
- id: devicename_button_state
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 13
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    id: devicename_button_state
    name: button_state
- id: led_red
  component_id: output.gpio
  fields:
    pin:
      value: 0
      locked: true
    inverted:
      value: true
      locked: true
    id: led_red
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    icon: mdi:wifi
    id: sensor_wifi_signal_1
    name: Wifi Signal
- id: sensor_total_daily_energy_1
  component_id: sensor.total_daily_energy
  fields:
    unit_of_measurement: kWh
    icon: mdi:calendar-clock
    id: sensor_total_daily_energy_1
    name: Todays Usage
- id: sensor_adc_1
  component_id: sensor.adc
  fields:
    icon: mdi:flash-outline
    id: sensor_adc_1
    name: VCC Volt
- id: sensor_hlw8012_1
  component_id: sensor.hlw8012
  fields:
    sel_pin:
      value:
        number: 12
        inverted: true
      locked: true
    cf_pin:
      value: 5
      locked: true
    cf1_pin:
      value: 4
      locked: true
    change_mode_every: 4
    update_interval: 3s
    id: sensor_hlw8012_1
    name: Hlw8012 1
- id: relay
  component_id: switch.gpio
  fields:
    pin:
      value: 15
      locked: true
    id: relay
    name: relay
- id: text_sensor_version_1
  component_id: text_sensor.version
  fields:
    icon: mdi:cube-outline
    id: text_sensor_version_1
    name: Version
source:
  type: esphome-devices
