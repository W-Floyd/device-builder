id: shelly_uni
name: Shelly Uni
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp_wroom_02
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Shelly-Uni/shelly_uni_625x625.webp
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Shelly-Uni/shelly_uni_scheme-1536x717.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Shelly-Uni/shelly_uni_gpio.jpg
tags:
- shelly
pins:
- gpio: 0
  available: false
  occupied_by: LED
- gpio: 4
  available: false
  occupied_by: out_2
- gpio: 12
  available: false
  occupied_by: Input 1
- gpio: 13
  available: false
  occupied_by: Input 2
- gpio: 14
  available: false
  occupied_by: ADC Range
- gpio: 15
  available: false
  occupied_by: out_1
- gpio: 17
  available: false
  occupied_by: Voltage
docs_url: https://devices.esphome.io/devices/Shelly-Uni/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 12
        mode: INPUT_PULLUP
        inverted: false
      locked: true
    id: binary_sensor_gpio_1
    name: Input 1
- id: binary_sensor_gpio_2
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 13
        mode: INPUT_PULLUP
        inverted: false
      locked: true
    id: binary_sensor_gpio_2
    name: Input 2
- id: led_status
  component_id: light.status_led
  fields:
    pin:
      value:
        number: 0
        inverted: true
      locked: true
    internal: true
    restore_mode: ALWAYS_OFF
    id: led_status
    name: LED
- id: out_1
  component_id: output.gpio
  fields:
    pin:
      value:
        number: 15
        inverted: false
      locked: true
    id: out_1
- id: out_2
  component_id: output.gpio
  fields:
    pin:
      value:
        number: 4
        inverted: false
      locked: true
    id: out_2
- id: sensor_rssi
  component_id: sensor.wifi_signal
  fields:
    update_interval: 90s
    entity_category: diagnostic
    id: sensor_rssi
    name: RSSI
- id: sensor_voltage
  component_id: sensor.adc
  fields:
    pin:
      value: 17
      locked: true
    accuracy_decimals: 1
    update_interval: 9s
    id: sensor_voltage
    name: Voltage
- id: switch_output_1
  component_id: switch.output
  fields:
    output: out_1
    id: switch_output_1
    name: Output 1
- id: switch_output_2
  component_id: switch.output
  fields:
    output: out_2
    id: switch_output_2
    name: Output 2
- id: adc_range
  component_id: switch.gpio
  fields:
    pin:
      value: 14
      locked: true
    restore_mode: RESTORE_DEFAULT_ON
    id: adc_range
    name: ADC Range
featured_bundles:
- id: switch_output_1_setup
  name: Output 1 (full setup)
  component_ids:
  - out_1
  - switch_output_1
- id: switch_output_2_setup
  name: Output 2 (full setup)
  component_ids:
  - out_2
  - switch_output_2
source:
  type: esphome-devices
  remote_id: Shelly-Uni
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Shelly-Uni/index.md
