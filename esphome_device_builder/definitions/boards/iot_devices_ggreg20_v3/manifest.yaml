id: iot_devices_ggreg20_v3
name: IoT-devices GGreg20_V3 module
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: nodemcuv2
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/IoT-devices-GGreg20-V3/image.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/IoT-devices-GGreg20-V3/image2.jpg
pins:
- gpio: 0
  available: false
  occupied_by: D3 Input Button
docs_url: https://devices.esphome.io/devices/IoT-devices-GGreg20-V3/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 0
        inverted: true
        mode: INPUT_PULLUP
      locked: true
    id: binary_sensor_gpio_1
    name: D3 Input Button
- id: my_doze_meter
  component_id: sensor.pulse_counter
  fields:
    unit_of_measurement: mkSv/Hour
    update_interval: 60s
    accuracy_decimals: 3
    id: my_doze_meter
    name: Ionizing Radiation Power
- id: sensor_integration_1
  component_id: sensor.integration
  fields:
    unit_of_measurement: mkSv
    icon: mdi:radioactive
    accuracy_decimals: 5
    time_unit: min
    sensor: my_doze_meter
    id: sensor_integration_1
    name: Total Ionizing Radiation Doze
featured_bundles:
- id: sensor_integration_1_setup
  name: Total Ionizing Radiation Doze (full setup)
  component_ids:
  - my_doze_meter
  - sensor_integration_1
