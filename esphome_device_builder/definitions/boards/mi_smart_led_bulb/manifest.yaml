id: mi_smart_led_bulb
name: Xiaomi Mi Smart LED Bulb
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: modwifi
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Mi-Smart-LED-Bulb/mi-smart-led-bulb-parts.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Mi-Smart-LED-Bulb/mi-smart-led-bulb-inside.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Mi-Smart-LED-Bulb/mi-smart-led-bulb-flash-pins.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Mi-Smart-LED-Bulb/mi-smart-led-bulb-pinout.jpg
pins:
- gpio: 5
  available: false
  occupied_by: pwm1
- gpio: 12
  available: false
  occupied_by: pwm3
- gpio: 13
  available: false
  occupied_by: pwm2
- gpio: 14
  available: false
  occupied_by: pwm4
docs_url: https://devices.esphome.io/devices/Mi-Smart-LED-Bulb/
featured_components:
- id: light01
  component_id: light.monochromatic
  fields:
    restore_mode: ALWAYS_ON
    default_transition_length: 0.2s
    output: pwm1
    id: light01
    name: Light
- id: pwm1
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 5
      locked: true
    id: pwm1
- id: pwm2
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 13
      locked: true
    id: pwm2
- id: pwm3
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 12
      locked: true
    id: pwm3
- id: pwm4
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 14
      locked: true
    id: pwm4
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: WiFi Signal
featured_bundles:
- id: light01_setup
  name: Light (full setup)
  component_ids:
  - pwm1
  - light01
source:
  type: esphome-devices
  remote_id: Mi-Smart-LED-Bulb
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Mi-Smart-LED-Bulb/index.md
  upstream_revision: 2bf64e131a2f72a0fc161c1f2f7d4de85c87a900
  content_hash: 6b38a91ade90b4476cefd9b89c78549cc39e88ff2c1d51e56c40dedb26a1994f
