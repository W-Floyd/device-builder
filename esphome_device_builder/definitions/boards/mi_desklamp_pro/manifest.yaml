id: mi_desklamp_pro
name: Xiaomi Mi Smart LED Desk Lamp Pro
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32dev
  variant: esp32
  framework: esp-idf
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Mi-Desklamp-Pro/screws_Image.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Mi-Desklamp-Pro/board_Image.jpg
pins:
- gpio: 2
  available: false
  occupied_by: output_cw
- gpio: 4
  available: false
  occupied_by: output_ww
- gpio: 26
  available: false
  occupied_by: rotation
- gpio: 27
  available: false
  occupied_by: rotation
- gpio: 33
  available: false
  occupied_by: button
docs_url: https://devices.esphome.io/devices/Mi-Desklamp-Pro/
featured_components:
- id: button
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 33
        inverted: true
        mode: INPUT_PULLDOWN
      locked: true
    id: button
    name: button
- id: light1
  component_id: light.cwww
  fields:
    default_transition_length: 0s
    constant_brightness: true
    cold_white_color_temperature: 4800 K
    warm_white_color_temperature: 2500 K
    restore_mode: RESTORE_DEFAULT_OFF
    gamma_correct: 1
    cold_white: output_cw
    warm_white: output_ww
    id: light1
    name: Light
- id: output_cw
  component_id: output.ledc
  fields:
    pin:
      value: 2
      locked: true
    frequency: 100000Hz
    id: output_cw
- id: output_ww
  component_id: output.ledc
  fields:
    pin:
      value: 4
      locked: true
    frequency: 100000Hz
    id: output_ww
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    icon: mdi:wifi
    id: sensor_wifi_signal_1
    name: WiFi Signal
- id: rotation
  component_id: sensor.rotary_encoder
  fields:
    pin_a:
      value: 26
      locked: true
    pin_b:
      value: 27
      locked: true
    resolution: 2
    id: rotation
    name: rotation
- id: text_sensor_version_1
  component_id: text_sensor.version
  fields:
    icon: mdi:cube-outline
    id: text_sensor_version_1
    name: Version
featured_bundles:
- id: light1_setup
  name: Light (full setup)
  component_ids:
  - output_cw
  - output_ww
  - light1
source:
  type: esphome-devices
  remote_id: Mi-Desklamp-Pro
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Mi-Desklamp-Pro/index.md
  upstream_revision: 2bf64e131a2f72a0fc161c1f2f7d4de85c87a900
  content_hash: ee90a7965984ed12527f8c7286eebefe7359fe7da97051a4a16851f0d6ac4340
