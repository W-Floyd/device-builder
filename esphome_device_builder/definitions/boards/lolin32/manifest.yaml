id: lolin32
name: WEMOS LOLIN32
description: ESP32-based board with 4MB flash, 240MHz featuring Wi-Fi, Bluetooth,
  Ethernet, CAN bus.
manufacturer: WEMOS
esphome:
  platform: esp32
  board: lolin32
  variant: esp32
  framework: esp-idf
hardware:
  flash_size: 4MB
  ram_size: 327680
  cpu_frequency: 240MHz
  connectivity:
  - wifi
  - bluetooth
  - ethernet
  - can
tags: []
docs_url: https://esphome.io/components/esp32.html
product_url: https://wiki.wemos.cc/products:lolin32:lolin32
