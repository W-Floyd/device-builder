id: m5stack-atoms3
name: M5Stack AtomS3
description: Compact ESP32-S3 board with a 0.85" LCD screen, button, and Grove connector
  in the ATOM form factor.
manufacturer: M5Stack
esphome:
  platform: esp32
  board: m5stack-atoms3
  variant: esp32s3
  framework: esp-idf
hardware:
  flash_size: 8MB
  cpu_frequency: 240MHz
  connectivity:
  - wifi
  - bluetooth
tags:
- compact
- display
- usb-c
docs_url: https://esphome.io/components/esp32.html
