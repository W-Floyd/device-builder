id: tuya_t3e_esp32_s3
name: TuYa T3E - ESP32 480*480 Smart Screen
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework: esp-idf
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- images/Eu-Version.png
- images/Asia-Version.png
- images/front.jpg
- images/back.jpg
- images/pin.jpg
pins:
- gpio: 2
  available: false
  occupied_by: Relay 3
- gpio: 4
  available: false
  occupied_by: tft_display
- gpio: 38
  available: false
  occupied_by: tft_display
- gpio: 39
  available: false
  occupied_by: tft_display
- gpio: 40
  available: false
  occupied_by: tft_display
- gpio: 41
  available: false
  occupied_by: tft_display
- gpio: 42
  available: false
  occupied_by: backlight_output
- gpio: 45
  available: false
  occupied_by: Relay 1
- gpio: 46
  available: false
  occupied_by: Relay 2
docs_url: https://devices.esphome.io/devices/Tuya-T3E-ESP32-S3/
featured_components:
- id: tft_display
  component_id: display.st7701s
  fields:
    update_interval: never
    auto_clear_enabled: false
    spi_mode: MODE3
    data_rate: 2MHz
    color_order: RGB
    invert_colors: true
    cs_pin:
      value:
        number: 4
        allow_other_uses: true
      locked: true
    de_pin:
      value: 40
      locked: true
    vsync_pin:
      value: 39
      locked: true
    hsync_pin:
      value: 38
      locked: true
    pclk_pin:
      value: 41
      locked: true
    pclk_inverted: false
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 50
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 20
    pclk_frequency: 12MHz
    reset_pin:
      value:
        number: 4
        allow_other_uses: true
      locked: true
    id: tft_display
    name: tft_display
- id: display_backlight
  component_id: light.monochromatic
  fields:
    restore_mode: ALWAYS_ON
    default_transition_length: 1s
    output: backlight_output
    id: display_backlight
    name: Backlight
- id: backlight_output
  component_id: output.ledc
  fields:
    pin:
      value: 42
      locked: true
    frequency: 1000Hz
    zero_means_zero: true
    id: backlight_output
- id: switch_gpio_1
  component_id: switch.gpio
  fields:
    pin:
      value:
        number: 45
        inverted: false
        ignore_strapping_warning: true
      locked: true
    id: switch_gpio_1
    name: Relay 1
- id: switch_gpio_2
  component_id: switch.gpio
  fields:
    pin:
      value:
        number: 46
        inverted: false
        ignore_strapping_warning: true
      locked: true
    id: switch_gpio_2
    name: Relay 2
- id: switch_gpio_3
  component_id: switch.gpio
  fields:
    pin:
      value:
        number: 2
        inverted: false
      locked: true
    id: switch_gpio_3
    name: Relay 3
- id: tft_touch
  component_id: touchscreen.gt911
  fields:
    display: tft_display
    id: tft_touch
    name: tft_touch
featured_bundles:
- id: display_backlight_setup
  name: Backlight (full setup)
  component_ids:
  - backlight_output
  - display_backlight
- id: tft_touch_setup
  name: tft_touch (full setup)
  component_ids:
  - tft_display
  - tft_touch
source:
  type: esphome-devices
  remote_id: Tuya-T3E-ESP32-S3
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Tuya-T3E-ESP32-S3/index.md
  upstream_revision: 7fa250835bc3d3a2b319dced285d5e0c27171bd1
  content_hash: 02fc8a2b1b66bf0bed74214bfffaf7a652e146d0d56ec8e43973250fea6186fd
