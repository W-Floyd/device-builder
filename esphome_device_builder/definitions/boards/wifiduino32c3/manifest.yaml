id: wifiduino32c3
name: Blinker WiFiduinoV2 (ESP32-C3)
description: blinker是一套专业且快捷的、跨硬件、跨平台的物联网解决方案，提供APP端、设备端、服务器端支持，使用公有云服务进行数据传输存储。可用于多种领域，可以帮助用户更好更快地搭建物联网项目。.
manufacturer: Blinker
esphome:
  platform: esp32
  board: wifiduino32c3
  variant: esp32c3
hardware:
  flash_size: 4MB
  ram_size: 327680
  cpu_frequency: 160MHz
  connectivity:
  - wifi
tags: []
docs_url: https://esphome.io/components/esp32.html
product_url: https://diandeng.tech
