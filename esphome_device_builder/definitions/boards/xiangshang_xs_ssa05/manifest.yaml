        inverted: true
      locked: true
    cf_pin:
      value: 5
      locked: true
    cf1_pin:
      value: 14
      locked: true
    id: sensor_hlw8012_1
    name: Hlw8012 1
- id: relay
  component_id: switch.gpio
  fields:
    pin:
      value: 12
      locked: true
    restore_mode: ALWAYS_OFF
    id: relay
    name: XS-SSA05 Relay
