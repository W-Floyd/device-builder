id: lsc_rgbw_led_strip
name: LSC-RGBW-LED-Strip
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp01_1m
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/LSC-RGBW-LED-Strip/image.jpg
pins:
- gpio: 4
  available: false
  occupied_by: pwm_red
- gpio: 12
  available: false
  occupied_by: pwm_green
- gpio: 13
  available: false
  occupied_by: pwm_white
- gpio: 14
  available: false
  occupied_by: pwm_blue
docs_url: https://devices.esphome.io/devices/LSC-RGBW-LED-Strip/
featured_components:
- id: aan
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    id: aan
    name: Remote On
- id: uit
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    id: uit
    name: Remote Off
- id: white
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    id: white
    name: Remote white
- id: blue
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    id: blue
    name: Remote blue
- id: red
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    id: red
    name: Remote red
- id: green
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    id: green
    name: Remote green
- id: strobe
  component_id: binary_sensor.remote_receiver
  fields:
    internal: true
    id: strobe
    name: Remote Strobe
- id: strip
  component_id: light.rgbw
  fields:
    red: pwm_red
    green: pwm_green
    blue: pwm_blue
    white: pwm_white
    id: strip
    name: strip
- id: pwm_red
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 4
      locked: true
    frequency: 1000 Hz
    id: pwm_red
- id: pwm_blue
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 14
      locked: true
    frequency: 1000 Hz
    id: pwm_blue
- id: pwm_green
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 12
      locked: true
    frequency: 1000 Hz
    id: pwm_green
- id: pwm_white
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 13
      locked: true
    frequency: 1000 Hz
    id: pwm_white
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: Wifi Signal Strength
featured_bundles:
- id: strip_setup
  name: strip (full setup)
  component_ids:
  - pwm_red
  - pwm_green
  - pwm_blue
  - pwm_white
  - strip
source:
  type: esphome-devices
  remote_id: LSC-RGBW-LED-Strip
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/LSC-RGBW-LED-Strip/index.md
  upstream_revision: 2bf64e131a2f72a0fc161c1f2f7d4de85c87a900
  content_hash: d49f23530f24a845c8248defe6a36b7c59f3f16df3c044879e348de85e1bed2f
