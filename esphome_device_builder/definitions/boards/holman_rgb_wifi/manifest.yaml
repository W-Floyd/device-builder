id: holman_rgb_wifi
name: Holman RGB Wifi Connected Controller
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp01_1m
hardware:
  connectivity:
  - wifi
images:
- images/holman_rgb_controller.png
pins:
- gpio: 0
  available: false
  occupied_by: Panel Button
- gpio: 12
  available: false
  occupied_by: output_component_green
- gpio: 13
  available: false
  occupied_by: output_component_red
- gpio: 14
  available: false
  occupied_by: output_component_blue
docs_url: https://devices.esphome.io/devices/Holman-RGB-Wifi/
featured_components:
- id: panelbutton
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 0
        inverted: true
        mode:
          input: true
          pullup: true
      locked: true
    id: panelbutton
    name: Panel Button
- id: restart_button
  component_id: button.restart
  fields:
    disabled_by_default: true
    id: restart_button
    name: Restart
- id: light_rgb_1
  component_id: light.rgb
  fields:
    red: output_component_red
    green: output_component_green
    blue: output_component_blue
    id: light_rgb_1
    name: RGB Lights
- id: output_component_red
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 13
      locked: true
    id: output_component_red
- id: output_component_green
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 12
      locked: true
    id: output_component_green
- id: output_component_blue
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 14
      locked: true
    id: output_component_blue
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 600s
    id: sensor_wifi_signal_1
    name: wifi signal
featured_bundles:
- id: light_rgb_1_setup
  name: RGB Lights (full setup)
  component_ids:
  - output_component_red
  - output_component_green
  - output_component_blue
  - light_rgb_1
source:
  type: esphome-devices
  remote_id: Holman-RGB-Wifi
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Holman-RGB-Wifi/index.md
  upstream_revision: 7fa250835bc3d3a2b319dced285d5e0c27171bd1
  content_hash: 93e80834d74dc7eb18054607cd90fe72fa8f1d4c4bac1004d26271b8707257a9
