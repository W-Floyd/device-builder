id: texxmo_iot_button
name: teXXmo IoT Button
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp8285
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/TeXXmo-IoT-Button/button_s_a.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/TeXXmo-IoT-Button/schematic.png
pins:
- gpio: 5
  available: false
  occupied_by: power_pin
- gpio: 12
  available: false
  occupied_by: led_red_pin
- gpio: 14
  available: false
  occupied_by: led_green_pin
docs_url: https://devices.esphome.io/devices/TeXXmo-IoT-Button/
featured_components:
- id: power_pin
  component_id: output.gpio
  fields:
    pin:
      value: 5
      locked: true
    id: power_pin
- id: led_red_pin
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 12
      locked: true
    id: led_red_pin
- id: led_green_pin
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 14
      locked: true
    id: led_green_pin
- id: button_adc
  component_id: sensor.adc
  fields:
    internal: true
    update_interval: 10s
    id: button_adc
    name: button_adc
source:
  type: esphome-devices
  remote_id: TeXXmo-IoT-Button
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/TeXXmo-IoT-Button/index.md
  upstream_revision: 2bf64e131a2f72a0fc161c1f2f7d4de85c87a900
  content_hash: 95ddbc5585c56826fab57022896315e6a5bf62b967da328ab42ce0b25182d3da
