id: m5stack_airq
name: M5Stack AirQ
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32-s3-devkitc-1
  variant: esp32s3
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- images/M5stack-AirQsensorDisplay.jpeg
- images/M5stack-AirQ.webp
pins:
- gpio: 0
  available: false
  occupied_by: Button A
- gpio: 8
  available: false
  occupied_by: Button B
- gpio: 10
  available: false
  occupied_by: enable
- gpio: 21
  available: false
  occupied_by: LED
- gpio: 42
  available: false
  occupied_by: Button Power
- gpio: 46
  available: false
  occupied_by: Button Hold
docs_url: https://devices.esphome.io/devices/M5Stack-AirQ/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 0
        ignore_strapping_warning: true
        mode:
          input: true
        inverted: true
      locked: true
    id: binary_sensor_gpio_1
    name: Button A
- id: binary_sensor_gpio_2
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 8
        mode:
          input: true
          pullup: true
        inverted: true
      locked: true
    id: binary_sensor_gpio_2
    name: Button B
- id: binary_sensor_gpio_3
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 46
        ignore_strapping_warning: true
      locked: true
    id: binary_sensor_gpio_3
    name: Button Hold
- id: binary_sensor_gpio_4
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 42
      locked: true
    id: binary_sensor_gpio_4
    name: Button Power
- id: id_led
  component_id: light.esp32_rmt_led_strip
  fields:
    rgb_order: GRB
    pin:
      value: 21
      locked: true
    num_leds: 1
    chipset: SK6812
    restore_mode: RESTORE_AND_OFF
    id: id_led
    name: LED
- id: enable
  component_id: output.gpio
  fields:
    pin:
      value: 10
      locked: true
    id: enable
- id: sensor_scd4x_1
  component_id: sensor.scd4x
  fields:
    address: 98
    update_interval: $sensor_interval
    id: sensor_scd4x_1
    name: Scd4X 1
- id: wifi_signal_db
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    entity_category: diagnostic
    id: wifi_signal_db
    name: Wifi Signal dB
- id: sen55
  component_id: sensor.sen5x
  fields:
    acceleration_mode: low
    store_baseline: true
    address: 105
    update_interval: $sensor_interval
    id: sen55
    name: sen55
source:
  type: esphome-devices
  remote_id: M5Stack-AirQ
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/M5Stack-AirQ/index.md
