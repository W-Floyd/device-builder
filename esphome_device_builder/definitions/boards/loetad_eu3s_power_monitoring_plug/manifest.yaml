id: loetad_eu3s_power_monitoring_plug
name: Loetad EU3S Power Monitoring Plug
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp01_1m
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Loetad-EU3S-Power-Monitoring-Plug/Loetad-EU3S-Power-Monitoring-Plug.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/Loetad-EU3S-Power-Monitoring-Plug/Loetad-EU3S-Power-Monitoring-Plug-Reference.jpg
tags:
- relay
- compact
pins:
- gpio: 2
  available: false
  occupied_by: blue_output
- gpio: 5
  available: false
  occupied_by: sensor.hlw8012
- gpio: 12
  available: false
  occupied_by: sensor.hlw8012
- gpio: 13
  available: false
  occupied_by: Button
- gpio: 14
  available: false
  occupied_by: sensor.hlw8012
- gpio: 15
  available: false
  occupied_by: relay
docs_url: https://devices.esphome.io/devices/Loetad-EU3S-Power-Monitoring-Plug/
featured_components:
- id: binary_sensor_gpio_1
  component_id: binary_sensor.gpio
  fields:
    device_class: power
    pin:
      value:
        number: 13
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    id: binary_sensor_gpio_1
    name: Button
- id: devicename_blue_led
  component_id: light.monochromatic
  fields:
    output: devicename_blue_output
    id: devicename_blue_led
    name: Light
- id: devicename_blue_output
  component_id: output.esp8266_pwm
  fields:
    pin:
      value:
        number: 2
        inverted: true
      locked: true
    id: devicename_blue_output
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: Wifi Signal
- id: sensor_hlw8012_1
  component_id: sensor.hlw8012
  fields:
    sel_pin:
      value:
        number: 12
        inverted: true
      locked: true
    cf_pin:
      value: 5
      locked: true
    cf1_pin:
      value: 14
      locked: true
    change_mode_every: 8
    update_interval: 10s
    id: sensor_hlw8012_1
    name: Hlw8012 1
- id: sensor_total_daily_energy_1
  component_id: sensor.total_daily_energy
  fields:
    icon: mdi:circle-slice-3
    unit_of_measurement: kWh
    id: sensor_total_daily_energy_1
    name: Total Daily Energy
- id: relay
  component_id: switch.gpio
  fields:
    pin:
      value: 15
      locked: true
    restore_mode: RESTORE_DEFAULT_OFF
    id: relay
    name: relay
featured_bundles:
- id: devicename_blue_led_setup
  name: Light (full setup)
  component_ids:
  - devicename_blue_output
  - devicename_blue_led
source:
  type: esphome-devices
  remote_id: Loetad-EU3S-Power-Monitoring-Plug
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Loetad-EU3S-Power-Monitoring-Plug/index.md
  upstream_revision: 7b98102863a3093e1d3c00c8bb77e71eeb43ad6e
  content_hash: 940506aad0940d9a81d5bfba52b2cb0169b355c4817c7e31b4b69138d72f2fbe
