id: blitzwolf_bw_shp7
name: Blitzwolf BW-SHP7 Double socket with powermonitoring
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp8285
hardware:
  connectivity:
  - wifi
images:
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/BlitzWolf-BW-SHP7/BlitzWolf-BW-SHP7-Power-Monitoring-Doubleplug.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/BlitzWolf-BW-SHP7/BlitzWolf-BW-SHP7-Power-Monitoring-Doubleplug-measurement.jpg
- https://raw.githubusercontent.com/esphome/esphome-devices/main/src/docs/devices/BlitzWolf-BW-SHP7/BlitzWolf-BW-SHP7-Power-Monitoring-Doubleplug-back.jpg
tags:
- relay
- compact
pins:
- gpio: 0
  available: false
  occupied_by: button1
- gpio: 2
  available: false
  occupied_by: led2
- gpio: 3
  available: false
  occupied_by: sensor.hlw8012
- gpio: 4
  available: false
  occupied_by: sensor.hlw8012
- gpio: 5
  available: false
  occupied_by: sensor.hlw8012
- gpio: 12
  available: false
  occupied_by: button2
- gpio: 13
  available: false
  occupied_by: led1
- gpio: 14
  available: false
  occupied_by: relay1
- gpio: 15
  available: false
  occupied_by: gpio15_irq
- gpio: 16
  available: false
  occupied_by: relay2
docs_url: https://devices.esphome.io/devices/BlitzWolf-BW-SHP7/
featured_components:
- id: button1
  component_id: binary_sensor.gpio
  fields:
    internal: true
    pin:
      value:
        number: 0
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    id: button1
    name: button1
- id: button2
  component_id: binary_sensor.gpio
  fields:
    internal: true
    pin:
      value:
        number: 12
        mode: INPUT_PULLUP
        inverted: true
      locked: true
    id: button2
    name: button2
- id: gpio15_irq
  component_id: binary_sensor.gpio
  fields:
    pin:
      value: 15
      locked: true
    internal: true
    id: gpio15_irq
    name: gpio15_irq
- id: led1
  component_id: output.esp8266_pwm
  fields:
    pin:
      value:
        number: 13
        inverted: true
      locked: true
    id: led1
- id: led2
  component_id: output.esp8266_pwm
  fields:
    pin:
      value:
        number: 2
        inverted: true
      locked: true
    id: led2
- id: sensor_hlw8012_1
  component_id: sensor.hlw8012
  fields:
    sel_pin:
      value:
        number: 3
        inverted: true
      locked: true
    cf_pin:
      value: 4
      locked: true
    cf1_pin:
      value: 5
      locked: true
    change_mode_every: 4
    update_interval: 10s
    id: sensor_hlw8012_1
    name: Hlw8012 1
- id: sensor_total_daily_energy_1
  component_id: sensor.total_daily_energy
  fields:
    unit_of_measurement: kWh
    accuracy_decimals: 5
    id: sensor_total_daily_energy_1
    name: daily energy
- id: relay1
  component_id: switch.gpio
  fields:
    pin:
      value: 14
      locked: true
    id: relay1
    name: relay1
- id: relay2
  component_id: switch.gpio
  fields:
    pin:
      value: 16
      locked: true
    id: relay2
    name: relay2
