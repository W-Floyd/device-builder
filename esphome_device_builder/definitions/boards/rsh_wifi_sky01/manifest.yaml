id: rsh_wifi_sky01
name: Tuya Galaxy / Laser Star Projector (RSH-WiFi-Sky01)
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp12e
hardware:
  connectivity:
  - wifi
images:
- images/Sky01.jpg
pins:
- gpio: 0
  available: false
  occupied_by: Status Led
- gpio: 4
  available: false
  occupied_by: red
- gpio: 5
  available: false
  occupied_by: laser_pwm
- gpio: 12
  available: false
  occupied_by: green
- gpio: 13
  available: false
  occupied_by: motor_pwm
- gpio: 14
  available: false
  occupied_by: blue
- gpio: 15
  available: false
  occupied_by: btn_led_pwm
- gpio: 16
  available: false
  occupied_by: Button
docs_url: https://devices.esphome.io/devices/RSH-WiFi-Sky01/
featured_components:
- id: node_name_button
  component_id: binary_sensor.gpio
  fields:
    pin:
      value:
        number: 16
        mode: INPUT_PULLDOWN_16
        inverted: true
      locked: true
    id: node_name_button
    name: Button
- id: rgb_light
  component_id: light.rgb
  fields:
    icon: mdi:star-shooting
    restore_mode: RESTORE_DEFAULT_OFF
    default_transition_length: 2s
    red: red
    green: green
    blue: blue
    id: rgb_light
    name: Light
- id: laser
  component_id: light.monochromatic
  fields:
    icon: mdi:laser-pointer
    restore_mode: ALWAYS_OFF
    default_transition_length: 3s
    output: laser_pwm
    id: laser
    name: Laser
- id: node_name_status_led
  component_id: light.status_led
  fields:
    icon: mdi:led-outline
    entity_category: diagnostic
    pin:
      value: 0
      locked: true
    internal: true
    id: node_name_status_led
    name: Status Led
- id: btn_led
  component_id: light.monochromatic
  fields:
    icon: mdi:led-outline
    entity_category: diagnostic
    restore_mode: ALWAYS_OFF
    output: btn_led_pwm
    id: btn_led
    name: Button Led
- id: red
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 4
      locked: true
    inverted:
      value: true
      locked: true
    id: red
- id: green
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 12
      locked: true
    inverted:
      value: true
      locked: true
    id: green
- id: blue
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 14
      locked: true
    inverted:
      value: true
      locked: true
    id: blue
- id: laser_pwm
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 5
      locked: true
    inverted:
      value: true
      locked: true
    id: laser_pwm
- id: motor_pwm
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 13
      locked: true
    min_power: 15%
    id: motor_pwm
- id: btn_led_pwm
  component_id: output.esp8266_pwm
  fields:
    pin:
      value: 15
      locked: true
    inverted:
      value: true
      locked: true
    id: btn_led_pwm
featured_bundles:
- id: rgb_light_setup
  name: Light (full setup)
  component_ids:
  - red
  - green
  - blue
  - rgb_light
- id: laser_setup
  name: Laser (full setup)
  component_ids:
  - laser_pwm
  - laser
- id: btn_led_setup
  name: Button Led (full setup)
  component_ids:
  - btn_led_pwm
  - btn_led
source:
