id: petkit_fresh_element_solo_pet_feeder
name: Petkit Fresh Element Solo Pet Feeder
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp32
  board: esp32dev
  variant: esp32
  framework: arduino
hardware:
  connectivity:
  - wifi
  - bluetooth
images:
- images/Petkit-Fresh-Element-Solo-Pet-Feeder-Product.jpg
- images/Petkit-Fresh-Element-Solo-Pet-Feeder-Flashing-A.png
- images/Petkit-Fresh-Element-Solo-Pet-Feeder-Flashing-B.png
pins:
- gpio: 5
  available: false
  occupied_by: led_output
- gpio: 14
  available: false
  occupied_by: feed_sensor
- gpio: 16
  available: false
  occupied_by: rtttl_output
- gpio: 17
  available: false
  occupied_by: feed_reverse
- gpio: 18
  available: false
  occupied_by: feed_forward
- gpio: 19
  available: false
  occupied_by: enable_feeder_motor
- gpio: 27
  available: false
  occupied_by: motor_sensor
- gpio: 33
  available: false
  occupied_by: enable_sensors
- gpio: 34
  available: false
  occupied_by: manual_feed_button
docs_url: https://devices.esphome.io/devices/Petkit-Fresh-Element-Solo-Pet-Feeder/
product_url: https://github.com/n6ham/esphome-configs/blob/master/petkit-fresh-element-solo.yaml
featured_components:
- id: manual_feed_button
  component_id: binary_sensor.gpio
  fields:
    internal: true
    pin:
      value:
        number: 34
        inverted: true
      locked: true
    id: manual_feed_button
    name: manual_feed_button
- id: motor_sensor
  component_id: binary_sensor.gpio
  fields:
    internal: true
    pin:
      value:
        number: 27
        inverted: true
      locked: true
    id: motor_sensor
    name: motor_sensor
- id: feed_sensor
  component_id: binary_sensor.gpio
  fields:
    internal: true
    pin:
      value:
        number: 14
      locked: true
    id: feed_sensor
    name: feed_sensor
- id: button_restart_1
  component_id: button.restart
  fields:
    disabled_by_default: true
    id: button_restart_1
    name: Restart
- id: led
  component_id: light.binary
  fields:
    internal: true
    output: led_output
    id: led
    name: led
- id: led_output
  component_id: output.gpio
  fields:
    pin:
      value: 5
      locked: true
    id: led_output
- id: rtttl_output
  component_id: output.ledc
  fields:
    pin:
      value: 16
      locked: true
    id: rtttl_output
- id: sensor_wifi_signal_1
  component_id: sensor.wifi_signal
  fields:
    update_interval: 60s
    id: sensor_wifi_signal_1
    name: Signal
- id: enable_sensors
  component_id: switch.gpio
  fields:
    internal: true
    pin:
      value:
        number: 33
      locked: true
    restore_mode: ALWAYS_ON
    disabled_by_default: true
    id: enable_sensors
    name: enable_sensors
- id: enable_feeder_motor
  component_id: switch.gpio
  fields:
    internal: true
    pin:
      value:
        number: 19
      locked: true
    restore_mode: ALWAYS_OFF
    disabled_by_default: true
    id: enable_feeder_motor
    name: enable_feeder_motor
- id: feed_forward
  component_id: switch.gpio
  fields:
    internal: true
    pin:
      value:
        number: 18
      locked: true
    restore_mode: ALWAYS_OFF
    id: feed_forward
    name: feed_forward
- id: feed_reverse
  component_id: switch.gpio
  fields:
    internal: true
    pin:
      value:
        number: 17
      locked: true
    restore_mode: ALWAYS_OFF
    id: feed_reverse
    name: feed_reverse
featured_bundles:
- id: led_setup
  name: led (full setup)
  component_ids:
  - led_output
  - led
source:
  type: esphome-devices
  remote_id: Petkit-Fresh-Element-Solo-Pet-Feeder
  upstream_url: https://github.com/esphome/esphome-devices/blob/main/src/docs/devices/Petkit-Fresh-Element-Solo-Pet-Feeder/index.md
  upstream_revision: 7fa250835bc3d3a2b319dced285d5e0c27171bd1
  content_hash: c35c5bbe258d03e0a17e1237fb164cfb2464c354aad475936377f6491c21c5e7
