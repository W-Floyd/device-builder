id: mirabella_genio_wi_fi_ses_led_candle
name: Mirabella Genio Wi-Fi SES LED Candle
description: Imported from devices.esphome.io — see linked docs for community notes.
esphome:
  platform: esp8266
  board: esp01_1m
hardware:
