id: apollo-esk-1
name: Apollo ESPHome Starter Kit
description: >
  Official ESPHome Starter Kit by Apollo Automation. Plug-and-play kit with
  an ESP32-C6-MINI-1 module, two 14-pin FPC expansion ports, onboard RGB LED,
  and USB-C power. Comes with three swappable sensor modules: PIR motion
  (MH-SR602, 0-3.5 m range), AHT20F temperature and humidity sensor, and
  an RGB LED strip with piezo buzzer. Any two modules can be used
  simultaneously to build a multisensor. No soldering or coding required.
manufacturer: Apollo Automation
images:
- https://cdn.shopify.com/s/files/1/0792/0959/5187/files/eskboard.jpg?v=1775723467
- https://cdn.shopify.com/s/files/1/0792/0959/5187/files/ESK-1_PCB.png?v=1775723467
- https://cdn.shopify.com/s/files/1/0792/0959/5187/files/20260408_121431.jpg?v=1775723467
esphome:
  platform: esp32
  board: esp32-c6-devkitm-1
  variant: esp32c6
  framework: esp-idf
hardware:
  flash_size: 8MB
  connectivity:
  - wifi
  - bluetooth
  - zigbee
  - thread
tags:
- starter-kit
- rgb-led
- usb-c
- lipo
- battery
docs_url: https://wiki.apolloautomation.com/products/esk1/buttongettingstarted/
product_url: https://apolloautomation.com/products/esk-1-esphome-starter-kit
featured: true
pins:
- gpio: 0
  label: I2C_SCL
  features:
  - i2c_scl
  - adc
  available: true
  notes: I2C clock line for sensor modules
- gpio: 1
  label: I2C_SDA
  features:
  - i2c_sda
  - adc
  available: true
  notes: I2C data line for sensor modules
- gpio: 2
  label: GPIO2
  features:
  - adc
  available: true
- gpio: 3
  label: GPIO3
  features:
  - adc
  available: true
  notes: FPC connector — default pin for the bundled PIR motion module
- gpio: 4
  label: ACCESSORY_PWR
  available: false
  occupied_by: Accessory power switch (controls FPC module power rail)
  notes: Internal GPIO switch, ALWAYS_ON with setup_priority 2000 — must latch high before FPC modules enumerate
- gpio: 5
  label: RGB_LED
  features:
  - rgb_led
  available: false
  occupied_by: Onboard WS2812 RGB LED
  notes: WS2812 addressable LED, active by default
- gpio: 6
  label: GPIO6
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 7
  label: GPIO7
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 9
  label: BUTTON
  features:
  - boot_button
  available: false
  occupied_by: Physical button
  notes: Active-low with internal pull-up, directly usable
- gpio: 14
  label: GPIO14
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 18
  label: GPIO18
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 16
  label: TXD0
  features:
  - uart_tx
- gpio: 17
  label: RXD0
  features:
  - uart_rx
featured_components:
- id: i2c_bus
  component_id: i2c
  name: I²C Bus (sensor modules)
  description: |
    The two FPC connectors expose the same I²C bus on GPIO0 (SCL) and
    GPIO1 (SDA). Configure I²C once and any of the swappable sensor
    modules (AHT20, additional I²C breakouts) will work.
  fields:
    id: i2c_bus
    scl:
      value: 0
      locked: true
    sda:
      value: 1
      locked: true
- id: aht20
  component_id: sensor.aht10
  name: AHT20 Temperature & Humidity
  description: |
    Sensor module shipped with the kit. Plug into either FPC connector;
    it talks I²C so no per-pin config is needed beyond the bus above.
  fields:
    id: aht20
    name: AHT20 Temperature & Humidity
    variant: AHT20
- id: battery_monitor
  component_id: sensor.max17043
  name: Battery Fuel Gauge (MAX17048)
  description: |
    Onboard MAX17048 fuel gauge for monitoring a LiPo battery. ESPHome's
    ``max17043`` driver speaks the same I²C protocol (fixed address
    ``0x36``, VCELL + SOC register layout) and reads voltage and
    state-of-charge correctly without any external component.
  fields:
    id: battery_monitor
    i2c_id: i2c_bus
    update_interval: 60s
    battery_voltage:
      value:
        name: Battery Voltage
    battery_level:
      value:
        name: Battery Level
- id: accessory_power
  component_id: switch.gpio
  name: Accessory Power Rail
  description: |
    Internal GPIO switch that gates power to the FPC accessory connectors.
    Must be ALWAYS_ON with an early setup_priority so the AHT20, PIR, RGB+buzzer
    and other plug-in modules are powered before they enumerate. Marked
    ``internal`` so it doesn't surface as a user-controllable entity.
  fields:
    id: accessory_power
    pin:
      value: 4
    name: Accessory Power
    restore_mode: ALWAYS_ON
    setup_priority: 2000
    internal: true
- id: pir_motion
  component_id: binary_sensor.gpio
  name: PIR Motion Module (MH-SR602)
  description: |
    Motion sensor module included with the kit.
  fields:
    id: pir_motion
    name: PIR Motion Module
    pin:
      value: 3
    device_class: motion
- id: boot_button
  component_id: binary_sensor.gpio
  name: Boot Button (onboard)
  description: |
    Physical pushbutton on the dev board tied to GPIO9. Active-low with the
    chip's internal pull-up, so configure with ``mode: INPUT_PULLUP`` and
    ``inverted: true``. Doubles as the bootloader strapping pin — hold while
    powering the board to enter download mode.
  fields:
    id: boot_button
    name: Boot Button
    pin:
      value:
        number: 9
        mode:
          input: true
          pullup: true
        inverted: true
      locked: true
- id: button_module
  component_id: binary_sensor.gpio
  name: Button Module (FPC accessory)
  description: |
    Plug-in pushbutton accessory module. Wired to GPIO6 on the FPC connector;
    active-low with internal pull-up so the ``inverted`` flag turns "pressed"
    into the on state.
  fields:
    id: button_1
    name: Button 1
    pin:
      value:
        number: 6
        mode:
          input: true
          pullup: true
        inverted: true
- id: rgb_strip
  component_id: light.esp32_rmt_led_strip
  name: RGB LED Strip (addon module)
  description: |
    Addressable LED strip from the RGB+buzzer addon. Ships with a 10-LED
    WS2812 strip in GRB order — adjust ``num_leds`` / ``rgb_order`` /
    ``chipset`` if you swap in a different strip.
  fields:
    id: rgb_strip
    name: RGB LED Strip
    pin:
      value: 14
    chipset: WS2812
    num_leds: 10
    rgb_order: GRB
- id: buzzer_output
  component_id: output.ledc
  name: Piezo Buzzer (addon module)
  description: |
    PWM output driving the piezo buzzer on the RGB+buzzer addon.
  fields:
    id: buzzer_output
    pin:
      value: 18
- id: rtttl_player
  component_id: rtttl
  name: RTTTL Player (addon buzzer)
  description: |
    Plays RTTTL ringtones through the piezo buzzer above. Wired to the
    ``buzzer_output`` LEDC output that ships with the same addon.
  fields:
    id: rtttl_player
    output:
      value: buzzer_output
      locked: true
featured_bundles:
- id: rgb_buzzer_module
  name: RGB LED + Buzzer Module
  description: |
    Plug-in addon shipped with the starter kit — addressable LED
    strip plus a piezo buzzer. Adds the strip, the buzzer PWM output,
    and the RTTTL player as one logical unit.
  component_ids: [rgb_strip, buzzer_output, rtttl_player]
