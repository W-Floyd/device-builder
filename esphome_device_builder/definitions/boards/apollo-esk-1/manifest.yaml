id: apollo-esk-1
name: Apollo ESPHome Starter Kit
description: >
  Official ESPHome Starter Kit by Apollo Automation. Plug-and-play kit with
  an ESP32-C6-MINI-1 module, two 14-pin FPC expansion ports, onboard RGB LED,
  and USB-C power. Comes with three swappable sensor modules: PIR motion
  (MH-SR602, 0-3.5 m range), AHT20F temperature and humidity sensor, and
  an RGB LED strip with piezo buzzer. Any two modules can be used
  simultaneously to build a multisensor. No soldering or coding required.
manufacturer: Apollo Automation
images:
- https://cdn.shopify.com/s/files/1/0792/0959/5187/files/eskboard.jpg?v=1775723467
- https://cdn.shopify.com/s/files/1/0792/0959/5187/files/ESK-1_PCB.png?v=1775723467
- https://cdn.shopify.com/s/files/1/0792/0959/5187/files/20260408_121431.jpg?v=1775723467
esphome:
  platform: esp32
  board: esp32-c6-devkitm-1
  variant: esp32c6
  framework: esp-idf
hardware:
  flash_size: 8MB
  connectivity:
  - wifi
  - bluetooth
  - zigbee
  - thread
tags:
- starter-kit
- rgb-led
- usb-c
docs_url: https://wiki.apolloautomation.com/products/esk1/buttongettingstarted/
product_url: https://apolloautomation.com/products/esk-1-esphome-starter-kit
featured: true
pins:
- gpio: 0
  label: I2C_SCL
  features:
  - i2c_scl
  - adc
  available: true
  notes: I2C clock line for sensor modules
- gpio: 1
  label: I2C_SDA
  features:
  - i2c_sda
  - adc
  available: true
  notes: I2C data line for sensor modules
- gpio: 2
  label: GPIO2
  features:
  - adc
  available: true
- gpio: 3
  label: GPIO3
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 5
  label: RGB_LED
  features:
  - rgb_led
  available: false
  occupied_by: Onboard WS2812 RGB LED
  notes: WS2812 addressable LED, active by default
- gpio: 6
  label: GPIO6
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 7
  label: GPIO7
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 9
  label: BUTTON
  features:
  - boot_button
  available: false
  occupied_by: Physical button
  notes: Active-low with internal pull-up, directly usable
- gpio: 14
  label: GPIO14
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 18
  label: GPIO18
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 30
  label: RX
  features:
  - uart_rx
  available: true
- gpio: 31
  label: TX
  features:
  - uart_tx
  available: true
featured_components:
- id: i2c_bus
  component_id: i2c
  name: I²C Bus (sensor modules)
  description: |
    The two FPC connectors expose the same I²C bus on GPIO0 (SCL) and
    GPIO1 (SDA). Configure I²C once and any of the swappable sensor
    modules (AHT20, additional I²C breakouts) will work.
  fields:
    id: i2c_bus
    scl:
      value: 0
      locked: true
    sda:
      value: 1
      locked: true
- id: aht20
  component_id: sensor.aht10
  name: AHT20 Temperature & Humidity
  description: |
    Sensor module shipped with the kit. Plug into either FPC connector;
    it talks I²C so no per-pin config is needed beyond the bus above.
  fields:
    id: aht20
    name: AHT20 Temperature & Humidity
    variant: AHT20
- id: pir_motion
  component_id: binary_sensor.gpio
  name: PIR Motion Module (MH-SR602)
  description: |
    Motion sensor module included with the kit.
  fields:
    id: pir_motion
    name: PIR Motion Module
    pin:
      value: 3
    device_class: motion
- id: rgb_strip
  component_id: light.esp32_rmt_led_strip
  name: RGB LED Strip (addon module)
  description: |
    Addressable LED strip from the RGB+buzzer addon. Defaults to 10 LEDs in
    GRB order — adjust to match your strip.
  fields:
    id: rgb_strip
    name: RGB LED Strip
    pin:
      value: 14
    num_leds: 10
    rgb_order: GRB
- id: buzzer_output
  component_id: output.ledc
  name: Piezo Buzzer (addon module)
  description: |
    PWM output driving the piezo buzzer on the RGB+buzzer addon.
  fields:
    id: buzzer_output
    pin:
      value: 18
- id: rtttl_player
  component_id: rtttl
  name: RTTTL Player (addon buzzer)
  description: |
    Plays RTTTL ringtones through the piezo buzzer above. Wire the
    ``output`` field to the buzzer output you just added.
  fields:
    id: rtttl_player
featured_bundles:
- id: rgb_buzzer_module
  name: RGB LED + Buzzer Module
  description: |
    Plug-in addon shipped with the starter kit — addressable LED
    strip plus a piezo buzzer. Adds the strip, the buzzer PWM output,
    and the RTTTL player as one logical unit.
  component_ids: [rgb_strip, buzzer_output, rtttl_player]
