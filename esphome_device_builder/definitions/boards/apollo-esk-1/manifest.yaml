id: apollo-esk-1
name: Apollo ESPHome Starter Kit
description: >
  Official ESPHome Starter Kit by Apollo Automation. Plug-and-play kit with
  an ESP32-C6-MINI-1 module, two 14-pin FPC expansion ports, onboard RGB LED,
  and USB-C power. Comes with four swappable modules: Motion Module
  (MH-SR602, 0-3.5 m range), AHT20F Temperature and Humidity Module, an
  RGB + Buzzer Module (10 RGB LEDs and a piezo buzzer in the
  ESPHome Casita form factor), and a Button Module. Up to two modules
  can be used simultaneously to build a multisensor. No soldering or
  coding required.
manufacturer: Apollo Automation
images:
- https://cdn.shopify.com/s/files/1/0792/0959/5187/files/eskboard.jpg?v=1775723467
- https://cdn.shopify.com/s/files/1/0792/0959/5187/files/ESK-1_PCB.png?v=1775723467
- https://cdn.shopify.com/s/files/1/0792/0959/5187/files/20260408_121431.jpg?v=1775723467
esphome:
  platform: esp32
  board: esp32-c6-devkitm-1
  variant: esp32c6
  framework: esp-idf
hardware:
  flash_size: 8MB
  connectivity:
  - wifi
  - bluetooth
  - zigbee
  - thread
tags:
- starter-kit
- rgb-led
- usb-c
- lipo
- battery
docs_url: https://wiki.apolloautomation.com/products/esk1/buttongettingstarted/
product_url: https://apolloautomation.com/products/esk-1-esphome-starter-kit
featured: true
pins:
- gpio: 0
  label: I2C SCL
  features:
  - i2c_scl
  - adc
  available: true
  notes: I2C clock line for sensor modules
- gpio: 1
  label: I2C SDA
  features:
  - i2c_sda
  - adc
  available: true
  notes: I2C data line for sensor modules
- gpio: 2
  label: GPIO2
  features:
  - adc
  available: true
- gpio: 3
  label: GPIO3
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 4
  label: ACCESSORY PWR
  available: false
  occupied_by: Accessory power switch (controls FPC module power rail)
  notes: Internal GPIO switch, ALWAYS_ON with setup_priority 2000 — must latch high before FPC modules enumerate
- gpio: 5
  label: ONBOARD LED
  features:
  - rgb_led
  available: false
  occupied_by: Onboard WS2812 RGB LED
  notes: WS2812 addressable LED, active by default
- gpio: 6
  label: GPIO6
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 7
  label: GPIO7
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 9
  label: Boot Button
  features:
  - boot_button
  available: false
  occupied_by: Physical button
  notes: Active-low with internal pull-up
- gpio: 14
  label: GPIO14
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 18
  label: GPIO18
  features:
  - adc
  available: true
  notes: Available on FPC connector
- gpio: 16
  label: TXD0
  features:
  - uart_tx
- gpio: 17
  label: RXD0
  features:
  - uart_rx
featured_components:
- id: i2c_bus
  component_id: i2c
  name: I²C Bus (sensor modules)
  description: |
    The shared I²C bus for the kit's sensor modules. Configure it once
    and the AHT20 module uses it, along with Apollo's optional breakout
    boards for adding more I²C sensors.
  fields:
    id: i2c_bus
    scl:
      value: 0
      locked: true
    sda:
      value: 1
      locked: true
- id: aht20
  component_id: sensor.aht10
  name: AHT20 Temperature & Humidity Module
  description: |
    Temperature and humidity module shipped with the starter kit. Plug
    it into either FPC connector and add the I²C Bus component so it
    can talk to the board. Accurate to ±0.3°C and ±2% humidity, useful
    for tracking room comfort or humidity in places like a bathroom or
    basement.
  fields:
    id: aht20
    variant: AHT20
# Uses ESPHome's max17043 driver for the MAX17048 chip. Same I²C
# protocol (fixed address 0x36, VCELL + SOC register layout).
- id: battery_monitor
  component_id: sensor.max17043
  name: Battery Fuel Gauge (MAX17048)
  description: |
    Onboard fuel gauge for monitoring the LiPo battery's voltage and
    charge level.
  fields:
    id: battery_monitor
    i2c_id: i2c_bus
    update_interval: 60s
    battery_voltage:
      value:
        name: Battery Voltage
    battery_level:
      value:
        name: Battery Level
# `internal: true` so this switch doesn't surface as a user-controllable
# entity in the home automation platform.
- id: accessory_power
  component_id: switch.gpio
  name: Accessory Power Rail
  description: |
    Internal switch that powers the FPC accessory connectors at boot.
    You don't need to touch this. It's set to always-on so plug-in
    modules get power before they start up.
  fields:
    id: accessory_power
    pin:
      value: 4
    name: Accessory Power
    restore_mode: ALWAYS_ON
    setup_priority: 2000
    internal: true
- id: motion_module
  component_id: binary_sensor.gpio
  name: Motion Module (MH-SR602)
  description: |
    Motion sensor module included with the starter kit. Detects motion
    in rooms like a kitchen, bathroom, or hallway, perfect for
    triggering lights or other automations.
  fields:
    id: motion_module
    name: Motion Module
    pin:
      value: 3
    device_class: motion
# Hardwired to GPIO 9 on the ESP32-C6 module.
- id: boot_button
  component_id: binary_sensor.gpio
  name: Boot Button (onboard)
  description: |
    The physical button on the dev board. Use it as a secondary button
    in automations, or hold it during power-on to enter boot mode for
    flashing.
  fields:
    id: boot_button
    name: Boot Button
    pin:
      value:
        number: 9
        mode:
          input: true
          pullup: true
        inverted: true
      locked: true
- id: button_module
  component_id: binary_sensor.gpio
  name: Button Module
  description: |
    Pushbutton module shipped with the starter kit. Plug it into the
    FPC connector (GPIO 6) and use it as a button input in automations.
  fields:
    id: button_module
    name: Button Module
    pin:
      value:
        number: 6
        mode:
          input: true
          pullup: true
        inverted: true
- id: rgb_leds
  component_id: light.esp32_rmt_led_strip
  name: RGB LEDs (module)
  description: |
    The 10 RGB LEDs by themselves, without the buzzer parts. If you have
    the whole RGB + Buzzer module, add the "RGB LED + Buzzer Module"
    bundle instead. It includes the LEDs along with the buzzer and
    ringtone player.
  fields:
    id: rgb_leds
    name: RGB LEDs
    pin:
      value: 14
    chipset: WS2812
    num_leds: 10
    rgb_order: GRB
- id: onboard_rgb_led
  component_id: light.esp32_rmt_led_strip
  name: Onboard RGB LED
  description: |
    The onboard RGB LED on the ESP32-C6 module.
  fields:
    id: onboard_rgb_led
    name: Onboard RGB LED
    pin:
      value: 5
      locked: true
    chipset: WS2812
    num_leds: 1
    rgb_order: GRB
- id: buzzer_output
  component_id: output.ledc
  name: Piezo Buzzer (module)
  description: |
    The piezo buzzer output by itself, without the LEDs. If you have
    the whole RGB + Buzzer module, add the "RGB LED + Buzzer Module"
    bundle instead. It includes the buzzer along with the LEDs and
    ringtone player.
  fields:
    id: buzzer_output
    pin:
      value: 18
- id: rtttl_player
  component_id: rtttl
  name: RTTTL Player (buzzer)
  description: |
    Plays ringtones through a piezo buzzer (RTTTL format). If you have
    the whole RGB + Buzzer module, add the "RGB LED + Buzzer Module"
    bundle instead. It includes the ringtone player along with the
    LEDs and buzzer.
  fields:
    id: rtttl_player
    output:
      value: buzzer_output
      locked: true
featured_bundles:
- id: rgb_buzzer_module
  name: RGB LED + Buzzer Module
  description: |
    The starter kit's RGB + Buzzer module. 10 RGB LEDs across the front.
    On the back: a piezo buzzer plus the FPC connector that plugs into
    the board. Adding this drops the LEDs, the buzzer, and the ringtone
    player into your config all at once.
  component_ids: [rgb_leds, buzzer_output, rtttl_player]
default_components:
# Always-on switch that powers the FPC accessory connectors —
# AHT20, battery monitor, and other plug-in modules need this
# latched high before they enumerate.
- accessory_power
# Built-in web dashboard so users can interact with the device
# without Home Assistant configured. Pinned to version 3 (the
# modern UI); ESPHome's catalog default is still 2.
- id: web_server
  fields:
    version: '3'
