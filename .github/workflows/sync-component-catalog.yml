name: Sync component catalog

# Re-runs ``script/sync_components.py`` against the latest published
# ESPHome schema (or a specific version on manual dispatch) and opens
# a pull request when ``definitions/components.json`` changes.
#
# Triggers
# --------
# - schedule : nightly at 03:00 UTC (cheap; the script is fully cached
#              when nothing has changed upstream).
# - manual   : ``workflow_dispatch`` with an optional ``version`` input
#              (e.g. ``2026.4.3``). When empty, the script picks the
#              latest GitHub release of esphome/esphome-schema.
#
# Output
# ------
# Always pushes to a stable branch named ``catalog/sync`` so the
# scheduled run keeps updating the same in-flight PR rather than
# spawning a new one every night. ``peter-evans/create-pull-request``
# closes the PR (and deletes the branch) automatically when the
# rebuild produces no diff.

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "ESPHome schema version (e.g. 2026.4.3). Leave empty for latest stable."
        required: false
        type: string
      include_prereleases:
        description: "Include pre-releases when auto-selecting the latest schema."
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-component-catalog
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package (with esphome extra)
        run: |
          python -m pip install --upgrade pip
          # ``[esphome]`` pulls in the esphome package so the narrow
          # introspection in sync_components (multi_conf, platform_defaults,
          # supported_platforms, type refinement) can run.
          pip install -e '.[esphome]'

      - name: Run sync_components
        id: sync
        run: |
          set -euo pipefail
          ARGS=()
          if [ -n "${{ inputs.version }}" ]; then
            ARGS+=(--version "${{ inputs.version }}")
          fi
          if [ "${{ inputs.include_prereleases }}" = "true" ]; then
            ARGS+=(--include-prereleases)
          fi
          python script/sync_components.py "${ARGS[@]}"
          # Surface the resolved version for the PR title / body.
          RESOLVED=$(python -c "import json; print(json.load(open('esphome_device_builder/definitions/components.json'))['esphome_schema_version'])")
          echo "version=$RESOLVED" >> "$GITHUB_OUTPUT"

      - name: Detect catalog changes
        id: diff
        run: |
          if git diff --quiet -- esphome_device_builder/definitions/components.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            # A short summary of what changed for the PR body.
            STAT=$(git diff --shortstat -- esphome_device_builder/definitions/components.json)
            {
              echo "diff_stat<<EOF"
              echo "$STAT"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Open / update pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: catalog/sync
          base: main
          commit-message: |
            Sync component catalog from schema ${{ steps.sync.outputs.version }}

            Auto-generated by .github/workflows/sync-component-catalog.yml.
          title: "Sync component catalog from schema ${{ steps.sync.outputs.version }}"
          body: |
            Automated catalog refresh from ESPHome schema
            **`${{ steps.sync.outputs.version }}`**.

            ${{ steps.diff.outputs.diff_stat }}

            Triggered by:
            **${{ github.event_name == 'schedule' && 'nightly schedule' || format('manual dispatch by @{0}', github.actor) }}**.

            Review checklist:
            - Sanity-check a couple of components in `esphome_device_builder/definitions/components.json` for unexpected drops or type changes.
            - Verify `script/sync_components.py` didn't itself need to change to handle a new upstream pattern.
            - Merge to deploy the new catalog.
          labels: |
            catalog
            automated
          delete-branch: true

      - name: No-op summary
        if: steps.diff.outputs.changed == 'false'
        run: |
          echo "::notice::Component catalog is already up to date for schema ${{ steps.sync.outputs.version }} - no PR opened."
