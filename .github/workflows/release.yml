name: Publish release

# Triggered when a GitHub release is published. The release form's
# "Set as a pre-release" checkbox is the betaness toggle: when
# checked, the tag MUST contain ``b`` (e.g. ``2026.5.0b1``); when
# unchecked, the tag MUST be a final release (e.g. ``2026.5.0``).
# That mirrors the matter-server / music-assistant convention so
# downstream tools can detect channel from the tag alone.
#
# Each run:
#   1. validates the tag matches the prerelease checkbox
#   2. rewrites ``pyproject.toml``'s placeholder version with the tag
#   3. builds an sdist + wheel
#   4. publishes to PyPI (org-level ``PYPI_TOKEN`` secret)
#   5. attaches both artifacts to the GitHub release as a fallback
#      install path
#
# Pre-releases land on PyPI with the ``b`` suffix; users opt in via
# ``pip install --pre esphome-device-builder``.

on:
  release:
    types: [published]

env:
  PYTHON_VERSION: "3.13"

permissions:
  contents: write  # to attach wheels to the release

jobs:
  build-and-publish:
    name: Build + publish
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.tag }}
      is_prerelease: ${{ github.event.release.prerelease }}
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Resolve tag
        id: vars
        run: echo "tag=${GITHUB_REF#refs/*/}" >> "$GITHUB_OUTPUT"

      - name: Validate tag against prerelease checkbox
        # PEP 440 betas use a ``b`` separator (``2026.5.0b1``). The
        # release form's checkbox is the source of truth for "is
        # this a beta"; fail loudly when the tag and the checkbox
        # disagree.
        run: |
          set -euo pipefail
          TAG='${{ steps.vars.outputs.tag }}'
          IS_PRE='${{ github.event.release.prerelease }}'
          if [[ "$IS_PRE" == "true" ]]; then
            if [[ "$TAG" != *"b"* ]]; then
              echo "::error::Pre-release checkbox is set but tag '$TAG' has no 'b' suffix."
              echo "::error::Tag a beta as e.g. 2026.5.0b1, or uncheck the pre-release box."
              exit 1
            fi
          else
            if [[ "$TAG" == *"b"* ]]; then
              echo "::error::Pre-release checkbox is unset but tag '$TAG' contains a 'b' suffix."
              echo "::error::Drop the b-suffix for a stable release, or check the pre-release box."
              exit 1
            fi
          fi

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tooling
        run: pip install build tomli tomli-w

      - name: Stamp pyproject.toml with the release version
        # ``pyproject.toml`` ships with ``version = "0.0.0"`` as a
        # placeholder. Rewrite it from the tag so the built wheel
        # advertises the right version.
        shell: python
        run: |-
          import tomli
          import tomli_w

          with open("pyproject.toml", "rb") as f:
              pyproject = tomli.load(f)
          pyproject["project"]["version"] = "${{ steps.vars.outputs.tag }}"
          with open("pyproject.toml", "wb") as f:
              tomli_w.dump(pyproject, f)

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          user: __token__
          # Org-level secret, granted to this repo. If the publish
          # ever 401s, check Settings → Secrets and variables →
          # Actions to confirm the token is still scoped here.
          password: ${{ secrets.PYPI_TOKEN }}

      - name: Attach artifacts to GitHub release
        # Fallback install path for users who want a specific build
        # without going through PyPI (e.g. air-gapped environments).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.vars.outputs.tag }}" dist/*
