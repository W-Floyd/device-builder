name: Release

# Cuts a release. Manual via ``workflow_dispatch`` or called by
# ``auto-release.yml``. The GitHub release is an output — do not
# publish one by hand.
#
# version must match channel: ``release`` → ``X.Y.Z``,
# ``prerelease`` → ``X.Y.ZbN``.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 2026.5.0 or 2026.5.0b1)"
        required: true
        type: string
      channel:
        description: "Release channel"
        required: true
        type: choice
        default: release
        options:
          - release
          - prerelease
  workflow_call:
    inputs:
      version:
        description: "Version number (e.g. 2026.5.0 or 2026.5.0b1)"
        required: true
        type: string
      channel:
        description: "Release channel: 'release' or 'prerelease'"
        required: true
        type: string
    secrets:
      ESPHOME_GITHUB_APP_PRIVATE_KEY:
        required: true

env:
  PYTHON_VERSION: "3.13"

permissions:
  contents: read

jobs:
  validate:
    name: Validate version + channel
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - name: Validate version format against channel
        id: check
        run: |
          set -euo pipefail
          VERSION='${{ inputs.version }}'
          CHANNEL='${{ inputs.channel }}'
          RELEASE_RE='^[0-9]+\.[0-9]+\.[0-9]+$'
          PRERELEASE_RE='^[0-9]+\.[0-9]+\.[0-9]+b[0-9]+$'

          case "$CHANNEL" in
            release)
              if ! [[ "$VERSION" =~ $RELEASE_RE ]]; then
                echo "::error::channel='release' requires version X.Y.Z (got '$VERSION')."
                exit 1
              fi
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
              ;;
            prerelease)
              if ! [[ "$VERSION" =~ $PRERELEASE_RE ]]; then
                echo "::error::channel='prerelease' requires version X.Y.ZbN (got '$VERSION')."
                exit 1
              fi
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unknown channel '$CHANNEL' (expected 'release' or 'prerelease')."
              exit 1
              ;;
          esac
          echo "✅ version $VERSION is valid for channel $CHANNEL"

      - name: Reject already-existing tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh api "repos/${{ github.repository }}/git/refs/tags/${{ inputs.version }}" --silent 2>/dev/null; then
            echo "::error::Tag '${{ inputs.version }}' already exists. Pick a new version."
            exit 1
          fi

  preflight:
    name: Preflight (lint + tests)
    needs: validate
    permissions:
      contents: read
    uses: ./.github/workflows/test.yml
    with:
      # Pin to the dispatch SHA so preflight, build and tag all
      # cover the same commit even if main advances mid-run.
      ref: ${{ github.sha }}

  build:
    name: Build sdist + wheel
    needs: [validate, preflight]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tooling
        run: pip install build tomli tomli-w

      - name: Stamp pyproject.toml with the release version
        # ``pyproject.toml`` ships with a ``0.0.0`` placeholder.
        shell: python
        run: |-
          import tomli
          import tomli_w

          with open("pyproject.toml", "rb") as f:
              pyproject = tomli.load(f)
          pyproject["project"]["version"] = "${{ inputs.version }}"
          with open("pyproject.toml", "wb") as f:
              tomli_w.dump(pyproject, f)

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  release:
    name: Tag and create GitHub release
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    outputs:
      release_url: ${{ steps.drafter.outputs.html_url }}
    steps:
      - name: Validate GitHub App configuration
        env:
          GITHUB_APP_CLIENT_ID: ${{ vars.ESPHOME_GITHUB_APP_CLIENT_ID }}
        run: |
          if [ -z "$GITHUB_APP_CLIENT_ID" ]; then
            echo "::error::Missing GitHub App Client ID."
            echo "::error::Set Actions variable ESPHOME_GITHUB_APP_CLIENT_ID and ensure it is shared with this repository."
            exit 1
          fi

      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          client-id: ${{ vars.ESPHOME_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.ESPHOME_GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: read

      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}" "${{ github.sha }}"
          git push origin "${{ inputs.version }}"

      - name: Generate release notes and publish GitHub release
        id: drafter
        uses: release-drafter/release-drafter@563bf132657a13ded0b01fcb723c5a58cdd824e2  # v7.2.1
        with:
          config-name: release-drafter.yml
          version: ${{ inputs.version }}
          tag: ${{ inputs.version }}
          name: ${{ inputs.version }}
          publish: true
          prerelease: ${{ needs.validate.outputs.is_prerelease }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Attach artifacts to GitHub release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh release upload "${{ inputs.version }}" dist/*

  publish-pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    # Drop ``continue-on-error`` after the first successful publish.
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    environment: pypi
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          skip-existing: true
